let W=1,D=0,TAB='today';
const LS=(k,v)=>{try{if(v!==undefined){localStorage.setItem(k,JSON.stringify(v));return v}return JSON.parse(localStorage.getItem(k))||{}}catch(e){return{}}};
function init(){let wb='<span class="wl">Week</span>';for(let i=1;i<=7;i++)wb+=`<button class="wk-btn${i===W?' on':''}" id="w${i}" onclick="setW(${i})">${i}</button>`;wb+='<span class="wk-theme" id="wkTheme">'+WT[0]+'</span>';document.getElementById('wkBar').innerHTML=wb;const tabs=[['today','📅','Today'],['week','🗓','Week'],['shop','🛒','Shop'],['recipes','📖','Recipes']];let bn='';tabs.forEach(([id,ic,lb])=>bn+=`<button class="${id===TAB?'on':''}" id="nav-${id}" onclick="setTab('${id}')"><span class="ni">${ic}</span>${lb}</button>`);document.getElementById('bnav').innerHTML=bn;render()}
function setW(w){W=w;document.querySelectorAll('.wk-btn').forEach(b=>b.classList.remove('on'));document.getElementById('w'+w).classList.add('on');document.getElementById('wkTheme').textContent=WT[w-1];render()}
function setTab(t){TAB=t;document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));document.getElementById('p-'+t).classList.add('on');document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('on'));document.getElementById('nav-'+t).classList.add('on');render()}
function render(){({today:rToday,week:rWeek,shop:rShop,recipes:rRecipes})[TAB]?.()}

// ===== TODAY (includes prep + workout) =====
function rToday(){
  const bf=BF[BA[W][DAYS[D]]],din=DIN[W][D],wo=WO[DAYS[D]];
  let h='<div class="days">';
  DAYS.forEach((d,i)=>{h+=`<div class="dbtn ${i===D?'on':''}" onclick="D=${i};render()"><div class="dd">${d}</div><div class="dn">${DN[i].slice(0,3)}</div></div>`});
  h+='</div>';
  // Dinner hero
  h+=`<div class="hero" onclick="document.getElementById('dinnerRecipe').scrollIntoView({behavior:'smooth'})" style="cursor:pointer"><div class="hero-label">Tonight's Dinner · tap for recipe ↓</div><div class="hero-meal">${din.n}</div><div class="hero-sub">${din.cu} · ${din.m}${din.sc?' · ⏰ Slow Cooker':''}</div><div class="hero-cost">$${din.co.toFixed(2)}/person</div></div>`;
  // Breakfast
  h+=`<div class="cd"><span class="badge badge-bf">${bf.i} Breakfast · ${bf.pr} protein</span><h3>${bf.n}</h3><div class="r-quick">${bf.q}</div><div class="meta"><span class="pill">⏱ ${bf.tm}</span><span class="pill pill-protein">💪 ${bf.pr}</span><span class="pill">${bf.c}</span></div><div class="acc" onclick="tog(this)">Ingredients & Steps</div><div class="acc-body"><ul class="ing">${bf.ing.map(x=>'<li>'+x+'</li>').join('')}</ul><ol class="stp">${bf.st.map(x=>'<li>'+x+'</li>').join('')}</ol><div class="tip">💡 ${bf.tip}</div><div class="plate">⚖️ ${bf.pl}</div></div></div>`;
  // Schedule
  h+=`<div class="cd"><span class="badge badge-sched">📋 Schedule</span>`;
  getSched(D,bf,din).forEach(r=>{h+=`<div class="srow ${r.a?'alert':r.h?'hl':''}"><span class="st">${r.t}</span><div class="se"><strong>${r.e}</strong><span>${r.d}</span></div></div>`});
  h+='</div>';
  // PREP (Sunday only — inline)
  if(DAYS[D]==='Sun'){
    const pk='prep'+W,pc=LS(pk);
    const b1=["Cook big batch of rice (3+ dinners)","Hard boil 10 eggs (snacks + breakfasts all week)","Make smoothie freezer bags for the week","Bake egg muffins — make 24 if possible","Prep overnight oats jars"];
    const b2=["Chop snack veggies (carrots, cucumber, celery)","Pack Monday lunch containers","Lay out Monday workout clothes","Check slow cooker supplies for the week","Thaw Mon/Tue proteins in fridge"];
    const all=[...b1,...b2],done=all.filter((_,i)=>pc[i]).length;
    h+=`<div class="cd"><span class="badge badge-prep">🥗 Sunday Meal Prep</span><div class="prep-prog"><span>${done}/${all.length}</span><div class="pp-bar"><div class="pp-fill" id="prepFill" style="width:${all.length?done/all.length*100:0}%"></div></div></div>`;
    h+=`<div class="shop-cat">🌅 Block 1 — Before Church (9–11am)</div>`;
    b1.forEach((t,i)=>{h+=`<div class="prep-i${pc[i]?' done':''}" id="pi${i}"><input type="checkbox" ${pc[i]?'checked':''} onchange="togPrep(${i},this)"><label>${t}</label></div>`});
    h+=`<div class="shop-cat">🌆 Block 2 — After Church (2:30pm+)</div>`;
    b2.forEach((t,j)=>{const i=j+b1.length;h+=`<div class="prep-i${pc[i]?' done':''}" id="pi${i}"><input type="checkbox" ${pc[i]?'checked':''} onchange="togPrep(${i},this)"><label>${t}</label></div>`});
    h+='</div>';
  }
  // WORKOUT
  h+=`<div class="cd"><span class="badge badge-work">🏋️ ${wo.type}</span><h3>${wo.type}</h3><p style="font-size:.82em;color:var(--text2);margin-bottom:12px">${wo.note}</p>`;
  wo.exercises.forEach(ex=>{
    h+=`<div class="ex-card"><div class="ex-name">${ex.name}</div><div class="ex-sets">${ex.sets}</div><div class="ex-desc">${ex.desc}</div></div>`;
  });
  // Workout timer
  h+=`<div class="ex-timer"><span class="et-display" id="woDisp">00:00</span><button class="et-start" id="woBtn" onclick="togWoTimer()">Start</button><input type="number" id="woMin" value="30" min="1" max="120" style="width:50px;padding:6px;border-radius:8px;border:1px solid var(--border);font-size:.9em;text-align:center"><span style="font-size:.75em;color:var(--text3)">min</span><button class="et-reset" onclick="resetWoTimer()">Reset</button>${muteBtn()}</div></div>`;
  // Dinner full recipe
  h+=`<div class="cd" id="dinnerRecipe"><span class="badge badge-din">🍽️ Dinner Recipe</span>${din.sc?'<span class="badge badge-sc" style="margin-left:6px">⏰ Slow Cooker</span>':''}<h3>${din.n}</h3><div class="meta"><span class="pill">${din.cu}</span><span class="pill">${din.m}</span><span class="pill">💰 $${din.co.toFixed(2)}</span></div><ul class="ing">${din.ing.map(x=>'<li>'+x+'</li>').join('')}</ul><ol class="stp">${din.st.map(x=>'<li>'+x+'</li>').join('')}</ol><div class="tip">💡 ${din.tp}</div><div class="plate">⚖️ ${din.pl}</div><button class="cook-btn" onclick="openCook(${W},${D})">🍳 Start Cooking Mode</button></div>`;

function showSparkles(el){

  const star=document.createElement('div');
  star.textContent='⭐';
  star.style.cssText=`position:absolute;left:${rect.left+rect.width/2-12}px;top:${rect.top+rect.height/2-12}px;font-size:24px;transition:all 0.5s ease;opacity:1;transform:scale(1)`;
  cont.appendChild(star);
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{star.style.transform='scale(2)';star.style.opacity='0'})});
  setTimeout(()=>cont.remove(),800);
}
function checkComplete(done,total,barEl){
  if(done===total&&total>0){
    playComplete();
    showSparkles(barEl);
  }
}
function toggleMute(){
  _muted=!_muted;
  document.querySelectorAll('.mute-btn').forEach(b=>{
    b.textContent=_muted?'🔇 Muted':'🔔 Sound On';
    b.style.background=_muted?'var(--coral-light)':'var(--green-pale)';
    b.style.color=_muted?'var(--coral)':'var(--green)';
  });
}
function guessMinutes(steps){
  let max=0;
  const all=steps.join(' ');
  const matches=all.match(/(\d+)[\s–-]*(\d*)\s*min/gi)||[];
  matches.forEach(m=>{
    const nums=m.match(/\d+/g);
    if(nums){const n=parseInt(nums[nums.length>1?1:0]);if(n>max&&n<=120)max=n;}
  });
  const hrMatch=all.match(/(\d+\.?\d*)\s*hr/i);
  if(hrMatch){const h=parseFloat(hrMatch[1])*60;if(h>max&&h<=120)max=h;}
  return max||15;
}
function muteBtn(){return `<button class="mute-btn" onclick="toggleMute()" style="padding:6px 14px;border-radius:20px;border:none;font-size:.72em;font-weight:700;cursor:pointer;font-family:inherit;background:${_muted?'var(--coral-light)':'var(--green-pale)'};color:${_muted?'var(--coral)':'var(--green)'}">${_muted?'🔇 Muted':'🔔 Sound On'}</button>`}

function resetWoTimer(){clearInterval(window._wti);_wtr=false;_wts=0;const b=document.getElementById('woBtn'),d=document.getElementById('woDisp');if(b){b.textContent='Start';b.style.background='var(--blue)'}if(d)d.textContent='00:00'}
let _ctr=false,_cts=0;
function togCkTimer(){ensureAudio();const b=document.getElementById('ckBtn'),d=document.getElementById('ckDisp');if(!_ctr){_cts=parseInt(document.getElementById('ckMin').value)*60;_ctr=true;b.textContent='Stop';b.style.background='var(--coral)';window._cti=setInterval(()=>{_cts--;if(_cts<=0){clearInterval(window._cti);_ctr=false;b.textContent='Done!';b.style.background='var(--green)';playCookAlarm()}d.textContent=fmt(_cts)},1000)}else{clearInterval(window._cti);_ctr=false;b.textContent='Start';b.style.background='var(--blue)'}}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.max(0,s%60)).padStart(2,'0')}
function tog(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}
// ===== THEME SYSTEM =====
const THEMES={
  default:{name:"Garden Fresh",bg:"#FAF6F0",card:"#FFFFFF",card2:"#F5F0E8",green:"#2D5016",green2:"#4A7C2E",green3:"#6B9B4A","green-light":"#E8F0E0","green-pale":"#F2F7ED",coral:"#D4654A","coral-light":"#FDE8E4",warm:"#D4A574","warm-light":"#FDF4E8",blue:"#3B6FA0","blue-light":"#E3F0FA",text:"#2C2016",text2:"#6B5D4F",text3:"#9B8E80",brown:"#5C3D2E",brown2:"#8B6914",border:"rgba(92,61,46,0.08)",hdr1:"#2D5016",hdr2:"#4A7C2E"},
  ocean:{name:"Deep Ocean",bg:"#0D1B2A",card:"#1B2838",card2:"#162230",green:"#007373",green2:"#00A5A5",green3:"#00C9C9","green-light":"#0D3333","green-pale":"#0F2E2E",coral:"#FF6B6B","coral-light":"#2A1A1A",warm:"#C9A96E","warm-light":"#1E1A14",blue:"#4DA8DA","blue-light":"#142830",text:"#E0E8F0",text2:"#8FA4B8",text3:"#5A7088",brown:"#C9A96E",brown2:"#DAB96E",border:"rgba(100,160,200,0.1)",hdr1:"#007373",hdr2:"#005F5F"},
  mystic:{name:"Mystic Berry",bg:"#1A0A24",card:"#261438",card2:"#1F1030",green:"#5D005D",green2:"#8B2E8B",green3:"#B050B0","green-light":"#2E1040","green-pale":"#250E35",coral:"#FF8C69","coral-light":"#2A1810",warm:"#D4A0D4","warm-light":"#1E1020",blue:"#7B68EE","blue-light":"#1A1435",text:"#F0E0F5",text2:"#B090C0",text3:"#705880",brown:"#D4A0D4",brown2:"#C890D0",border:"rgba(150,80,180,0.12)",hdr1:"#5D005D",hdr2:"#3D003D"},
  sage:{name:"Sage & Cream",bg:"#F5F1EB",card:"#FFFFFF",card2:"#EDE8E0",green:"#5F7A5E",green2:"#7A9B78",green3:"#96B494","green-light":"#E0E8DE","green-pale":"#EBF0EA",coral:"#C07050","coral-light":"#FAEAE4",warm:"#C4A882","warm-light":"#F8F0E6",blue:"#6888A0","blue-light":"#E4ECF2",text:"#3A3830",text2:"#6A6860",text3:"#9A9890",brown:"#705840",brown2:"#907040",border:"rgba(60,56,48,0.08)",hdr1:"#5F7A5E",hdr2:"#4A6548"},
  sunset:{name:"Desert Sunset",bg:"#1C1210",card:"#2A1E1A",card2:"#241814",green:"#B8620B",green2:"#D4850E",green3:"#E8A030","green-light":"#2E1E10","green-pale":"#281A10",coral:"#E84040","coral-light":"#2A1414",warm:"#D4A060","warm-light":"#201610",blue:"#5090C0","blue-light":"#142028",text:"#F0E4D8",text2:"#B8A090",text3:"#806858",brown:"#D4A060",brown2:"#C89850",border:"rgba(200,160,96,0.1)",hdr1:"#8B4513",hdr2:"#6B3410"},
  mint:{name:"Fresh Mint",bg:"#F0FAF5",card:"#FFFFFF",card2:"#E8F5EE",green:"#1B8A6B",green2:"#25A880",green3:"#40C098","green-light":"#D0F0E0","green-pale":"#E0F8EE",coral:"#E06050","coral-light":"#FDECEC",warm:"#D0A870","warm-light":"#FDF6EC",blue:"#4088B0","blue-light":"#E0F0F8",text:"#1A3028",text2:"#4A6858",text3:"#78988A",brown:"#6A5030",brown2:"#8A6A38",border:"rgba(30,100,70,0.06)",hdr1:"#1B8A6B",hdr2:"#158060"}
};
let _activeTheme='default';
function applyPreset(id){
  _activeTheme=id;
  const t=THEMES[id];
  const r=document.documentElement.style;
  Object.entries(t).forEach(([k,v])=>{if(k!=='name'&&k!=='hdr1'&&k!=='hdr2')r.setProperty('--'+k,v)});
  // Update header gradient
  document.querySelector('.hdr').style.background=`linear-gradient(145deg,${t.hdr1} 0%,${t.hdr2} 100%)`;
  // Update week button active states
  document.querySelectorAll('.wk-btn.on').forEach(b=>{b.style.background=t.green;b.style.borderColor=t.green});
  // Save preference
  try{localStorage.setItem('fk-theme',id)}catch(e){}
  // Update preset highlights
  document.querySelectorAll('.theme-pre').forEach(p=>p.classList.toggle('active',p.dataset.id===id));
  // Sync color pickers
  syncPickers(t);
}
function syncPickers(t){
  const map={'tc-bg':'bg','tc-card':'card','tc-green':'green','tc-coral':'coral','tc-text':'text'};
  Object.entries(map).forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.value=t[key]});
}
function customTheme(){
  const bg=document.getElementById('tc-bg').value;
  const card=document.getElementById('tc-card').value;
  const green=document.getElementById('tc-green').value;
  const coral=document.getElementById('tc-coral').value;
  const text=document.getElementById('tc-text').value;
  const r=document.documentElement.style;
  r.setProperty('--bg',bg);r.setProperty('--card',card);r.setProperty('--card2',blendColor(card,bg,0.5));
  r.setProperty('--green',green);r.setProperty('--green2',lighten(green,15));r.setProperty('--green3',lighten(green,30));
  r.setProperty('--green-light',blendColor(green,bg,0.15));r.setProperty('--green-pale',blendColor(green,bg,0.08));
  r.setProperty('--coral',coral);r.setProperty('--coral-light',blendColor(coral,bg,0.12));
  r.setProperty('--text',text);r.setProperty('--text2',blendColor(text,bg,0.6));r.setProperty('--text3',blendColor(text,bg,0.4));
  r.setProperty('--warm',blendColor('#D4A574',bg,0.7));r.setProperty('--warm-light',blendColor('#D4A574',bg,0.1));
  r.setProperty('--blue',blendColor('#3B6FA0',green,0.5));r.setProperty('--blue-light',blendColor('#3B6FA0',bg,0.1));
  r.setProperty('--brown',blendColor('#5C3D2E',text,0.6));r.setProperty('--brown2',blendColor('#8B6914',text,0.6));
  r.setProperty('--border',hexToRgba(text,0.08));
  document.querySelector('.hdr').style.background=`linear-gradient(145deg,${green} 0%,${lighten(green,12)} 100%)`;
  document.querySelectorAll('.theme-pre').forEach(p=>p.classList.remove('active'));
  _activeTheme='custom';
  try{localStorage.setItem('fk-theme','custom');localStorage.setItem('fk-custom',JSON.stringify({bg,card,green,coral,text}))}catch(e){}
}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b]}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('')}
function blendColor(c1,c2,ratio){const[r1,g1,b1]=hexToRgb(c1),[r2,g2,b2]=hexToRgb(c2);return rgbToHex(r1*ratio+r2*(1-ratio),g1*ratio+g2*(1-ratio),b1*ratio+b2*(1-ratio))}
function lighten(c,pct){const[r,g,b]=hexToRgb(c);return rgbToHex(r+(255-r)*pct/100,g+(255-g)*pct/100,b+(255-b)*pct/100)}
function hexToRgba(h,a){const[r,g,b]=hexToRgb(h);return `rgba(${r},${g},${b},${a})`}
function openTheme(){
  const d=document.getElementById('themeDrawer');d.classList.add('on');
  let h='';
  Object.entries(THEMES).forEach(([id,t])=>{
    h+=`<div class="theme-pre ${id===_activeTheme?'active':''}" data-id="${id}" onclick="applyPreset('${id}')" style="background:${t.bg};color:${t.text}"><div class="tp-name">${t.name}</div><div class="tp-swatches"><div class="tp-swatch" style="background:${t.green}"></div><div class="tp-swatch" style="background:${t.coral}"></div><div class="tp-swatch" style="background:${t.card}"></div><div class="tp-swatch" style="background:${t.text}"></div></div></div>`;
  });
  document.getElementById('themePresets').innerHTML=h;
  syncPickers(THEMES[_activeTheme]||THEMES.default);
}
function closeTheme(){document.getElementById('themeDrawer').classList.remove('on')}
function loadSavedTheme(){
  try{
    const saved=localStorage.getItem('fk-theme');
    if(saved&&saved!=='custom'&&THEMES[saved])applyPreset(saved);
    else if(saved==='custom'){
      const c=JSON.parse(localStorage.getItem('fk-custom'));
      if(c){setTimeout(()=>{document.getElementById('tc-bg').value=c.bg;document.getElementById('tc-card').value=c.card;document.getElementById('tc-green').value=c.green;document.getElementById('tc-coral').value=c.coral;document.getElementById('tc-text').value=c.text;customTheme()},100)}
    }
  }catch(e){}
}

init();
loadSavedTheme();
</script>
