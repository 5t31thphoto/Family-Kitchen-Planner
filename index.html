<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D5016">
<title>The Family Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#FAF6F0;--card:#FFFFFF;--card2:#F5F0E8;--green:#2D5016;--green2:#4A7C2E;--green3:#6B9B4A;--green-light:#E8F0E0;--green-pale:#F2F7ED;--brown:#5C3D2E;--brown2:#8B6914;--warm:#D4A574;--warm-light:#FDF4E8;--coral:#D4654A;--coral-light:#FDE8E4;--blue:#3B6FA0;--blue-light:#E3F0FA;--text:#2C2016;--text2:#6B5D4F;--text3:#9B8E80;--border:rgba(92,61,46,0.08);--shadow:0 1px 3px rgba(44,32,22,0.06),0 4px 12px rgba(44,32,22,0.04);--r:20px;--rs:12px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--nav-h:68px}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;min-height:100dvh;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);overflow-x:hidden}
.hdr{background:linear-gradient(145deg,#2D5016 0%,#3D6B20 60%,#4A7C2E 100%);color:#fff;padding:calc(var(--safe-top) + 14px) 20px 16px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%);border-radius:50%}
.hdr h1{font-family:'Playfair Display',Georgia,serif;font-size:1.5em;font-weight:700;position:relative;z-index:1}
.hdr .sub{font-size:.72em;opacity:.7;margin-top:3px;position:relative;z-index:1}
.wk-bar{display:flex;align-items:center;gap:6px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.wk-bar .wl{font-weight:700;font-size:.7em;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-right:4px}
.wk-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--bg);font-weight:700;font-size:.8em;cursor:pointer;color:var(--text2);transition:all .2s}
.wk-btn.on{background:var(--green);color:#fff;border-color:var(--green);transform:scale(1.1);box-shadow:0 2px 8px rgba(45,80,22,0.3)}
.wk-theme{flex:1;text-align:right;font-family:'Playfair Display',serif;font-size:.85em;color:var(--green2);font-weight:700}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-bottom));z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.04)}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:.6em;font-weight:600;font-family:inherit;transition:color .15s;letter-spacing:.3px}
.bnav button .ni{font-size:1.8em;line-height:1.2;transition:transform .15s}
.bnav button.on{color:var(--green)}.bnav button.on .ni{transform:scale(1.15)}
.pnl{display:none;padding:12px 16px 20px;max-width:480px;margin:0 auto;animation:fadeUp .25s ease}
.pnl.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);border-radius:var(--r);padding:20px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;bottom:-30px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,0.05);border-radius:50%}
.hero .hero-label{font-size:.65em;text-transform:uppercase;letter-spacing:1.5px;opacity:.7;font-weight:600}
.hero .hero-meal{font-family:'Playfair Display',serif;font-size:1.4em;margin-top:6px;font-weight:700;line-height:1.3}
.hero .hero-sub{font-size:.8em;opacity:.8;margin-top:6px}
.hero .hero-cost{position:absolute;top:18px;right:18px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);padding:4px 12px;border-radius:20px;font-size:.75em;font-weight:700}
.days{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding:2px}
.days::-webkit-scrollbar{display:none}
.dbtn{flex:none;width:48px;text-align:center;padding:8px 0;border-radius:var(--rs);border:2px solid transparent;background:var(--card);cursor:pointer;transition:all .2s}
.dbtn .dd{font-size:.55em;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.5px}
.dbtn .dn{font-size:.95em;font-weight:700;color:var(--text);margin-top:1px}
.dbtn.on{background:var(--green);border-color:var(--green);box-shadow:0 2px 8px rgba(45,80,22,0.25)}
.dbtn.on .dd,.dbtn.on .dn{color:#fff}
.cd{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.cd h3{font-family:'Playfair Display',serif;font-size:1.05em;color:var(--text);margin-bottom:8px;line-height:1.3}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.6em;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:4px 10px;border-radius:20px}
.badge-bf{background:var(--warm-light);color:var(--brown2)}
.badge-din{background:var(--green-pale);color:var(--green)}
.badge-sc{background:var(--coral-light);color:var(--coral)}
.badge-sched{background:#E3F2FD;color:#1565C0}
.badge-work{background:#EDE7F6;color:#5E35B1}
.badge-prep{background:#FFF8E1;color:#F57F17}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.pill{font-size:.68em;padding:4px 10px;border-radius:20px;background:var(--card2);color:var(--text2);font-weight:600}
.pill-protein{background:var(--green-pale);color:var(--green)}
.srow{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.srow:last-child{border-bottom:none}
.srow .st{font-weight:700;color:var(--green);min-width:50px;font-size:.75em;padding-top:1px}
.srow .se{flex:1}.srow .se strong{font-size:.82em;display:block;color:var(--text)}.srow .se span{font-size:.72em;color:var(--text3);display:block;margin-top:1px}
.srow.alert{background:var(--coral-light);border-radius:var(--rs);padding:10px;margin:2px -10px;border-bottom:none}
.srow.hl{background:var(--green-pale);border-radius:var(--rs);padding:10px;margin:2px -10px;border-bottom:none}
.r-quick{background:var(--warm-light);border-radius:var(--rs);padding:10px 14px;font-size:.85em;font-weight:600;color:var(--brown);margin:8px 0;border-left:4px solid var(--warm)}
.ing{columns:2;column-gap:14px;list-style:none;margin:8px 0;font-size:.82em}
.ing li{padding:3px 0 3px 16px;break-inside:avoid;position:relative;color:var(--text2)}
.ing li::before{content:'•';position:absolute;left:2px;color:var(--green3);font-weight:800}
.stp{counter-reset:s;list-style:none;margin:8px 0}
.stp li{font-size:.82em;padding:8px 0 8px 36px;position:relative;border-bottom:1px solid var(--border);color:var(--text2)}
.stp li:last-child{border-bottom:none}
.stp li::before{counter-increment:s;content:counter(s);position:absolute;left:0;width:26px;height:26px;background:var(--green);color:#fff;border-radius:50%;text-align:center;line-height:26px;font-size:.72em;font-weight:700}
.tip{background:var(--warm-light);border-left:4px solid var(--warm);padding:10px 14px;border-radius:0 var(--rs) var(--rs) 0;font-size:.8em;margin:10px 0;color:var(--brown)}
.plate{background:var(--green-pale);border-left:4px solid var(--green3);padding:10px 14px;border-radius:0 var(--rs) var(--rs) 0;font-size:.8em;margin:10px 0;color:var(--green)}
.acc{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:4px 0;user-select:none}
.acc::after{content:'';width:8px;height:8px;border-right:2px solid var(--text3);border-bottom:2px solid var(--text3);transform:rotate(45deg);transition:transform .2s;flex-shrink:0}
.acc.open::after{transform:rotate(-135deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}.acc-body.open{max-height:9000px}
.shop-prog{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:10px 0}
.shop-fill{height:100%;background:linear-gradient(90deg,var(--green3),var(--green));border-radius:4px;transition:width .4s}
.shop-count{font-size:.75em;color:var(--text3);text-align:right;margin-bottom:8px}
.si{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.si input{width:22px;height:22px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.si .sn{flex:1;font-size:.85em;transition:opacity .2s}
.si .sp{font-size:.82em;font-weight:700;color:var(--coral);min-width:50px;text-align:right}
.si.done .sn{opacity:.35;text-decoration:line-through}
.shop-cat{font-weight:700;font-size:.7em;text-transform:uppercase;letter-spacing:1px;color:var(--green);padding:14px 0 6px}
.stotal{display:flex;justify-content:space-between;padding:14px 0;font-weight:700;color:var(--green);border-top:2px solid var(--green);margin-top:4px}
.prep-i{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.prep-i input{margin-top:2px;width:22px;height:22px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.prep-i label{font-size:.85em;cursor:pointer;flex:1;transition:opacity .2s}
.prep-i.done label{opacity:.35;text-decoration:line-through}
.prep-prog{display:flex;align-items:center;gap:8px;font-size:.75em;color:var(--text3);margin-bottom:6px}
.prep-prog .pp-bar{flex:1;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.prep-prog .pp-fill{height:100%;background:var(--green3);border-radius:3px;transition:width .3s}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.ov-card{background:var(--card);border-radius:var(--rs);padding:12px;border:2px solid var(--border);cursor:pointer;transition:all .15s}
.ov-card:active{transform:scale(0.97)}
.ov-card .ov-day{font-weight:700;color:var(--green);font-size:.65em;text-transform:uppercase;letter-spacing:.8px}
.ov-card .ov-din{font-family:'Playfair Display',serif;font-size:.85em;color:var(--text);margin:4px 0 2px;line-height:1.3}
.ov-card .ov-bf{font-size:.72em;color:var(--text3)}
.ov-card .ov-cost{font-size:.72em;color:var(--coral);font-weight:700;margin-top:4px}
.ov-card.sun{border-color:var(--green-light);background:var(--green-pale)}
.ov-card.fri{border-color:#FFF3E0;background:var(--warm-light)}
.ov-card.sat{border-color:var(--green-light);background:#F2F7ED}
.brow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85em}
.brow .bl{color:var(--text2)}.brow .br{font-weight:700}
.brow.tot{border-top:2px solid var(--green);border-bottom:none;padding-top:14px;font-size:.95em}.brow.tot .br{color:var(--green)}
/* EXERCISE */
.ex-card{background:var(--blue-light);border-radius:var(--rs);padding:14px;margin-bottom:8px;border-left:4px solid var(--blue)}
.ex-card .ex-name{font-weight:700;font-size:.9em;color:var(--text);margin-bottom:4px}
.ex-card .ex-sets{font-size:.78em;font-weight:600;color:var(--blue);margin-bottom:4px}
.ex-card .ex-desc{font-size:.78em;color:var(--text2);line-height:1.5}
.ex-timer{display:flex;align-items:center;gap:10px;margin-top:12px;padding:12px;background:var(--card);border-radius:var(--rs);flex-wrap:wrap}
.ex-timer .et-display{font-family:'DM Sans',monospace;font-size:2em;font-weight:700;color:var(--blue);min-width:80px}
.ex-timer button{padding:8px 18px;border-radius:20px;border:none;font-weight:700;font-size:.8em;cursor:pointer;font-family:inherit}
.et-start{background:var(--blue);color:#fff}
.et-reset{background:var(--card2);color:var(--text2);margin-left:4px}
/* COOK MODE */
.cook-mode{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.cook-mode.on{display:flex}
.cook-top{background:var(--green);color:#fff;padding:calc(var(--safe-top) + 12px) 16px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:1}
.cook-top .cook-close{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cook-top h2{font-family:'Playfair Display',serif;font-size:1.1em;flex:1}
.cook-body{flex:1;padding:16px;overflow-y:auto}
.cook-step{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.cook-step .cs-num{width:36px;height:36px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;margin-bottom:10px}
.cook-step p{font-size:.95em;line-height:1.6}
.cook-btn{display:block;width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--green);color:#fff;font-size:.9em;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:transform .1s}
.cook-btn:active{transform:scale(0.97)}
.sec{font-family:'Playfair Display',serif;font-size:1.15em;color:var(--text);margin:16px 0 10px}
@media(min-width:500px){.ov-grid{grid-template-columns:repeat(3,1fr)}.days{justify-content:center}}
/* THEME EDITOR */
.theme-toggle{position:absolute;top:calc(var(--safe-top) + 16px);right:16px;width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;font-size:.75em;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .2s;backdrop-filter:blur(4px)}
.theme-toggle:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.4)}
.theme-drawer{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.theme-drawer.on{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.theme-sheet{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-bottom));animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.theme-sheet h3{font-family:'Playfair Display',serif;font-size:1.1em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.theme-sheet .close-theme{width:32px;height:32px;border-radius:50%;border:none;background:var(--card2);font-size:1em;cursor:pointer;display:flex;align-items:center;justify-content:center}
.theme-presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.theme-pre{border-radius:var(--rs);padding:12px;cursor:pointer;border:2px solid var(--border);transition:all .15s;text-align:center}
.theme-pre:active{transform:scale(0.97)}
.theme-pre.active{border-color:var(--green);box-shadow:0 0 0 2px var(--green)}
.theme-pre .tp-name{font-weight:700;font-size:.8em;margin-bottom:6px}
.theme-pre .tp-swatches{display:flex;gap:4px;justify-content:center}
.theme-pre .tp-swatch{width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,0.1)}
.theme-custom{margin-top:14px}
.theme-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.theme-row label{flex:1;font-size:.82em;font-weight:600;color:var(--text2)}
.theme-row input[type=color]{width:40px;height:32px;border:2px solid var(--border);border-radius:8px;cursor:pointer;padding:2px;background:var(--card)}
.theme-reset{margin-top:14px;text-align:center}
.theme-reset button{background:none;border:1px solid var(--border);border-radius:20px;padding:8px 20px;font-size:.78em;color:var(--text3);cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="hdr"><h1>🍳 The Family Kitchen</h1><div class="sub">7-Week Planner · Family of 5 · $3–$5/Person</div><button class="theme-toggle" onclick="openTheme()" title="Theme">🎨</button></div>
<div class="theme-drawer" id="themeDrawer" onclick="if(event.target===this)closeTheme()">
<div class="theme-sheet">
<h3>Color Theme <button class="close-theme" onclick="closeTheme()">✕</button></h3>
<div class="theme-presets" id="themePresets"></div>
<div class="theme-custom">
<div style="font-weight:700;font-size:.78em;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px">Custom Colors</div>
<div class="theme-row"><label>Background</label><input type="color" id="tc-bg" onchange="customTheme()"></div>
<div class="theme-row"><label>Cards</label><input type="color" id="tc-card" onchange="customTheme()"></div>
<div class="theme-row"><label>Primary (header, buttons)</label><input type="color" id="tc-green" onchange="customTheme()"></div>
<div class="theme-row"><label>Accent (prices, alerts)</label><input type="color" id="tc-coral" onchange="customTheme()"></div>
<div class="theme-row"><label>Text</label><input type="color" id="tc-text" onchange="customTheme()"></div>
</div>
<div class="theme-reset"><button onclick="applyPreset('default');closeTheme()">Reset to Default</button></div>
</div>
</div>
<div class="wk-bar" id="wkBar"></div>
<div class="pnl on" id="p-today"></div>
<div class="pnl" id="p-week"></div>
<div class="pnl" id="p-shop"></div>
<div class="pnl" id="p-recipes"></div>
<div class="bnav" id="bnav"></div>
<div class="cook-mode" id="cookMode"><div class="cook-top"><button class="cook-close" onclick="closeCook()">✕</button><h2 id="cookTitle"></h2></div><div class="cook-body" id="cookBody"></div></div>
<script>
const WT=["Classic Family Favorites","Global Mix","Budget Stretchers","Comfort & Hearty","Fan Favorites Remix","Southern & Slow","Around the World"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],DN=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

// ===== WORKOUTS WITH DESCRIPTIONS =====
const WO={
Sun:{type:"Rest + Meal Prep",note:"Light movement only today. Your body recovers while you prep the week.",exercises:[
{name:"Gentle Walk",sets:"20–30 min",desc:"Easy pace around the neighborhood or on a treadmill. No rushing — this is recovery. Breathe deeply, enjoy the fresh air. Bring the kids if they want to come."},
{name:"Full Body Stretch",sets:"10 min",desc:"Touch your toes (hold 20 sec), quad stretch (pull heel to glute, 20 sec each), shoulder rolls (10 forward, 10 back), neck tilts side to side, seated spinal twist. Hold each stretch — don't bounce."}]},
Mon:{type:"Upper Body Strength",note:"After school pickup. 30–40 min in the garage or living room.",exercises:[
{name:"Push-Ups",sets:"3 × 12",desc:"Hands shoulder-width apart on the floor. Lower your chest to the ground, elbows at 45 degrees (not flared out). Push back up. Keep your body in a straight line — don't let your hips sag. Modified version: do these from your knees if needed."},
{name:"Dumbbell Rows",sets:"3 × 10 each arm",desc:"Hold a dumbbell in one hand, put the other hand and knee on a chair or bench. Pull the weight straight up to your hip like you're starting a lawnmower. Squeeze your shoulder blade at the top. Lower slowly. Do all 10 on one side, then switch."},
{name:"Shoulder Press",sets:"3 × 10",desc:"Stand with a dumbbell in each hand at shoulder height, palms facing forward. Press straight up overhead until arms are fully extended. Lower back to shoulders slowly. Keep your core tight — don't arch your back."},
{name:"Tricep Dips",sets:"3 × 12",desc:"Sit on the edge of a sturdy chair, hands gripping the seat beside your hips. Slide your butt off the chair and lower yourself by bending your elbows to 90 degrees. Push back up. Keep your back close to the chair."},
{name:"Plank Hold",sets:"3 × 30 sec",desc:"Forearms on the ground, elbows under shoulders. Body in a straight line from head to heels. Squeeze your abs and glutes. Don't let your hips drop or pike up. Breathe steadily. If 30 sec is easy, go to 45."}]},
Tue:{type:"Cardio + Core",note:"After school pickup. 30–40 min. Get your heart rate up, then hit the abs.",exercises:[
{name:"Brisk Walk or Jog",sets:"20 min",desc:"Start with 5 min walking to warm up. Then pick up the pace — you should be breathing hard but able to say short sentences. If jogging hurts your knees, power walk with big arm swings instead. Cool down with 2 min easy walking."},
{name:"Bicycle Crunches",sets:"3 × 20",desc:"Lie on your back, hands behind your head. Bring your right elbow to your left knee while extending your right leg. Alternate sides in a pedaling motion. Don't pull on your neck — let your abs do the work. Each left-right counts as 1 rep."},
{name:"Russian Twists",sets:"3 × 15 each side",desc:"Sit on the floor, knees bent, feet slightly lifted. Lean back slightly. Clasp your hands together and twist your torso to touch the floor on your left, then right. That's 1 rep. For more challenge, hold a water bottle or light weight."},
{name:"Leg Raises",sets:"3 × 12",desc:"Lie flat on your back, hands under your hips for support. Keeping legs straight, lift them together to 90 degrees, then lower slowly without touching the floor. If your lower back lifts off the ground, bend your knees slightly."},
{name:"Mountain Climbers",sets:"3 × 15 each side",desc:"Start in a push-up position. Drive your right knee toward your chest, then quickly switch to your left knee. It's like running in place horizontally. Keep your hips level and your core tight. Go as fast as you can with good form."}]},
Wed:{type:"Lower Body Strength",note:"After school pickup. 30–40 min. Legs and glutes today.",exercises:[
{name:"Squats",sets:"3 × 15",desc:"Stand with feet shoulder-width apart. Push your hips back like sitting into a chair. Lower until your thighs are parallel to the floor. Keep your chest up and knees tracking over your toes. Drive through your heels to stand back up."},
{name:"Walking Lunges",sets:"3 × 10 each leg",desc:"Step forward with your right foot and lower your back knee toward the floor. Both knees should be at about 90 degrees. Push off your front foot and step your left foot forward into the next lunge. Keep your torso upright."},
{name:"Glute Bridges",sets:"3 × 15",desc:"Lie on your back, knees bent, feet flat on the floor hip-width apart. Push through your heels to lift your hips until your body forms a straight line from shoulders to knees. Squeeze your glutes hard at the top. Lower slowly."},
{name:"Calf Raises",sets:"3 × 20",desc:"Stand on the edge of a step with your heels hanging off. Rise up onto your toes as high as you can, hold for 1 second, then lower your heels below the step level. Hold onto a wall for balance if needed."},
{name:"Wall Sit",sets:"3 × 30 sec",desc:"Stand with your back flat against a wall. Slide down until your thighs are parallel to the floor, like sitting in an invisible chair. Keep your back pressed firmly against the wall. Hold. Your quads will burn — that means it's working."}]},
Thu:{type:"Full Body Circuit",note:"After school pickup. 30–40 min. Fast-paced — keep moving between exercises.",exercises:[
{name:"Burpees",sets:"3 × 8",desc:"Stand, then squat down and place your hands on the floor. Jump your feet back into a push-up position. Do a push-up (optional). Jump your feet back to your hands. Explode up into a jump with arms overhead. That's 1. Modified: step back instead of jumping."},
{name:"Jumping Jacks",sets:"3 × 20",desc:"Stand with feet together, arms at your sides. Jump your feet out wide while raising your arms overhead. Jump back to starting position. Keep a steady rhythm. Land softly on the balls of your feet."},
{name:"Dumbbell Squats",sets:"3 × 12",desc:"Hold a dumbbell in each hand at your sides (or one dumbbell at your chest in a goblet position). Perform a squat as described above. The added weight makes your legs and core work harder. Keep your chest up."},
{name:"Push-Ups",sets:"3 × 10",desc:"Same form as Monday. Hands shoulder-width, lower your chest, push back up. If you're tired from the circuit, drop to your knees — no shame in that. Quality over quantity."},
{name:"High Knees",sets:"3 × 20 each leg",desc:"Stand in place and run, driving your knees up to hip height with each step. Pump your arms like you're sprinting. This is a cardio burst — go fast! 20 each leg means 40 total knee drives per set."}]},
Fri:{type:"Family Activity",note:"Everyone is home by 2pm! Get outside together. 45–60 min of fun movement.",exercises:[
{name:"Family Bike Ride or Walk",sets:"30–45 min",desc:"Ride bikes around the neighborhood, walk to a nearby park, or hike a local trail together. Let the kids set the pace. The point is being active together, not hitting a heart rate target. Bring water bottles."},
{name:"Backyard Games",sets:"15–20 min",desc:"Tag, catch, soccer, basketball, jump rope, obstacle course — whatever gets everyone moving and laughing. Challenge the kids to races. Let them win sometimes. This is bonding time that happens to be exercise."},
{name:"Family Stretch Cool-Down",sets:"5 min",desc:"Sit in a circle and stretch together. Touch your toes, butterfly stretch (soles of feet together, press knees down), reach across your body for a shoulder stretch. Show the kids how to stretch properly — it's a life skill."}]},
Sat:{type:"Active Family Day",note:"Morning activity before the Walmart run. 45–60 min of adventure.",exercises:[
{name:"Family Walk or Hike",sets:"30–45 min",desc:"Find a local trail, walk through a park, or explore a new neighborhood together. Saturday morning walks are a great family tradition. Talk about the week. Plan something fun. Bring snacks and water."},
{name:"Backyard Play or Sports",sets:"15–20 min",desc:"Toss a football, shoot hoops, play freeze tag, do relay races in the yard. Get creative — the kids will have ideas. This is exercise disguised as play. Everyone gets their heart rate up without it feeling like a workout."},
{name:"Cool-Down Stretch",sets:"5 min",desc:"Same family stretch as Friday. Reach for the sky, fold forward, twist gently side to side. Deep breaths. You just moved your body as a family — that matters more than any gym session."}]}
};

// ===== BREAKFASTS =====
const BF={S1:{n:"Peanut Butter Banana Protein Shake",i:"🥤",t:"Smoothie",q:"Dump freezer bag into blender, add milk + protein powder, blend 45 seconds.",pr:"30g",c:"$0.90",tm:"2 min",ing:["1 frozen banana","1 tbsp peanut butter","1 scoop protein powder","1 cup milk","1 cup spinach (frozen in bag)","1 tbsp honey"],st:["Dump freezer bag into blender.","Add 1 cup milk and 1 scoop protein powder.","Blend 45 seconds until smooth.","Pour and go — drink on the drive or while packing lunches."],tip:"Kids love this one too — make a half-portion in a small cup. The peanut butter keeps everyone full until lunch.",pl:"This is already a perfect balanced breakfast: protein powder + peanut butter = 30g protein. Under 350 cal."},S2:{n:"Berry Blast Protein Smoothie",i:"🥤",t:"Smoothie",q:"Dump berry bag into blender, add yogurt + protein powder + milk, blend 1 minute.",pr:"28g",c:"$1.10",tm:"2 min",ing:["1 cup frozen mixed berries","1/2 frozen banana","1/2 cup Greek yogurt","1 scoop protein powder","3/4 cup milk","1 tsp honey"],st:["Dump berry freezer bag into blender.","Add Greek yogurt, protein powder, and milk.","Blend 60 seconds until smooth and creamy.","Pour into a travel cup — good to go."],tip:"The Greek yogurt makes this extra thick and creamy. Kids think it tastes like a milkshake.",pl:"Greek yogurt + protein powder = 28g protein. Add a hard-boiled egg on the side for 35g total."},S3:{n:"Tropical Green Power Smoothie",i:"🥤",t:"Smoothie",q:"Blend freezer bag + coconut milk + protein powder, 45 seconds.",pr:"27g",c:"$1.00",tm:"2 min",ing:["1/2 cup frozen mango chunks","1/2 cup frozen pineapple","2 cups baby spinach (frozen in bag)","1 scoop protein powder","1 cup milk or coconut milk","1 tbsp honey"],st:["Dump tropical freezer bag into blender.","Add milk and protein powder.","Blend 45–60 seconds until smooth.","Tastes like a tropical treat — kids won't taste the spinach!"],tip:"The pineapple completely hides the spinach taste. Even picky eaters love this one. Double the bag for Dad + kids portions.",pl:"26g protein from powder alone. Add a cheese stick on the side for 33g total."},O1:{n:"Peanut Butter Banana Power Oats",i:"🫙",t:"Oats",q:"Grab jar from fridge. Eat cold or microwave 60 seconds. Done.",pr:"22g",c:"$0.75",tm:"30 sec",ing:["1/2 cup rolled oats","1/2 cup milk","1/4 cup Greek yogurt","1 tbsp peanut butter","1 tbsp chia seeds","1/2 banana sliced","1 tsp honey","Pinch of cinnamon"],st:["In a mason jar: oats, milk, Greek yogurt, chia seeds, peanut butter, honey, cinnamon.","Stir well, then top with banana slices.","Seal and refrigerate overnight (or up to 4 days).","MORNING: Grab jar, eat cold or microwave 60 seconds."],tip:"Make 4 jars on Sunday — that's 4 mornings handled. The chia seeds + Greek yogurt + PB make these seriously filling.",pl:"22g protein from Greek yogurt + PB + chia seeds. A full breakfast under 380 calories."},O2:{n:"Berry Cheesecake Protein Oats",i:"🫙",t:"Oats",q:"Grab jar from fridge. Stir and eat — or 60 seconds in microwave.",pr:"25g",c:"$0.85",tm:"30 sec",ing:["1/2 cup rolled oats","1/4 cup Greek yogurt","2 tbsp cream cheese (softened)","1/2 scoop protein powder","1/2 cup mixed berries","1/2 cup milk","1 tbsp honey","1 tbsp granola for topping"],st:["In jar: oats, milk, yogurt, cream cheese, protein powder, honey. Stir well.","Top with mixed berries and granola.","Seal and refrigerate overnight (up to 4 days).","MORNING: Grab, stir, eat. Kids love the cheesecake flavor."],tip:"The cream cheese makes it taste like dessert. This is the one the kids will ask for by name.",pl:"25g protein from yogurt + protein powder + cream cheese. Tastes indulgent, works hard."},O3:{n:"Apple Cinnamon Crunch Oats",i:"🫙",t:"Oats",q:"Grab jar from fridge. Eat cold — the crunch topping makes it special.",pr:"20g",c:"$0.70",tm:"30 sec",ing:["1/2 cup rolled oats","1/4 cup Greek yogurt","1/2 cup milk","1/2 apple diced","1 tbsp almond butter","1 tsp cinnamon","1 tsp honey","2 tbsp granola + 1 tbsp almonds for crunch"],st:["In jar: oats, milk, yogurt, almond butter, cinnamon, honey. Stir well.","Add diced apple.","Seal and refrigerate overnight (up to 3 days).","MORNING: Open jar, add granola + almonds for crunch. Eat and enjoy."],tip:"Tastes like apple pie for breakfast. The almond butter adds protein and makes it stick-to-your-ribs filling.",pl:"20g protein from yogurt + almond butter. The fiber from oats + apple keeps you full past lunch."},M1:{n:"Bacon Cheddar Egg Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3 from fridge, microwave 40–50 seconds. Family favorite.",pr:"12g/muffin",c:"$0.40/ea",tm:"1 min",ing:["8 eggs","1/4 cup milk","6 strips bacon (cooked + crumbled)","1 cup shredded cheddar","1 tsp garlic powder","Salt & pepper","Cooking spray"],st:["SUNDAY: Cook bacon until crispy. Drain and crumble.","Preheat oven to 350°F. Spray muffin tin generously.","Whisk eggs, milk, garlic powder, salt & pepper. Stir in bacon and cheddar.","Fill muffin cups 3/4 full. Bake 18–20 minutes until set and golden.","Cool completely. Store in fridge up to 5 days.","MORNING: Grab 2–3, microwave 40–50 seconds."],tip:"Make 24 — these are everyone's favorite and they go fast. Dad and kids love them too.",pl:"2 muffins = 24g protein. Add a banana for a complete breakfast under 350 cal."},M2:{n:"Southwest Black Bean Egg Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3 from fridge, microwave 40–50 seconds. Hearty and filling.",pr:"11g/muffin",c:"$0.35/ea",tm:"1 min",ing:["8 eggs","1/4 cup milk","1/2 cup black beans (rinsed)","1/2 cup diced bell pepper","1 cup shredded Mexican cheese","1 tsp cumin","Salt & pepper","Cooking spray"],st:["Preheat oven to 350°F. Spray muffin tin well.","Whisk eggs, milk, cumin, salt & pepper.","Distribute black beans and bell pepper evenly among cups.","Pour egg mixture over, top with cheese.","Bake 18–20 minutes until puffed and golden.","Cool. Store in fridge up to 5 days."],tip:"The black beans add extra protein and fiber — these keep you full the longest of any muffin.",pl:"2 muffins = 22g protein. The black beans + egg combo is a powerhouse."},M3:{n:"Ham & Swiss Egg Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3 from fridge, microwave 40–50 seconds.",pr:"13g/muffin",c:"$0.45/ea",tm:"1 min",ing:["8 eggs","1/4 cup milk","1 cup diced deli ham","1 cup shredded Swiss cheese","1 tsp Dijon mustard","Salt & pepper","Cooking spray"],st:["Preheat oven to 350°F. Spray muffin tin.","Whisk eggs, milk, mustard, salt & pepper.","Distribute diced ham among cups.","Pour egg mixture over, top with Swiss cheese.","Bake 18–20 minutes until golden and set.","Cool. Store in fridge up to 5 days."],tip:"The Dijon adds a tiny flavor kick that kids love. These taste like a deli sandwich in muffin form.",pl:"2 muffins = 26g protein. Ham + eggs + cheese is a protein triple-play."},M4:{n:"Veggie Garden Egg Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3 from fridge, microwave 40–50 seconds.",pr:"10g/muffin",c:"$0.35/ea",tm:"1 min",ing:["8 eggs","1/4 cup milk","1/2 cup diced zucchini","1/2 cup diced bell pepper","1/4 cup diced mushrooms","1 cup shredded mozzarella","1 tsp Italian seasoning","Salt & pepper","Cooking spray"],st:["Preheat oven to 350°F. Spray muffin tin.","Sauté zucchini, pepper, mushrooms 3–4 minutes until soft. Cool slightly.","Whisk eggs, milk, Italian seasoning, salt & pepper.","Distribute veggies among cups. Pour egg mixture. Top with mozzarella.","Bake 18–20 minutes until golden.","Cool. Store in fridge up to 5 days."],tip:"Sneak veggies into breakfast! The mozzarella melts into a stretchy topping kids enjoy.",pl:"2 muffins = 20g protein. Packed with veggies + cheese. A nutrient-dense start."},H1:{n:"Dad's Famous Scrambled Eggs + Toast",i:"🍳",t:"Hot Plate",q:"Crack eggs, scramble with cheese, serve with whole wheat toast.",pr:"24g",c:"$0.80",tm:"5 min",ing:["2 eggs per person","Splash of milk","2 tbsp shredded cheddar per serving","Whole wheat toast (2 slices)","Butter for pan","Salt & pepper"],st:["Crack 2 eggs per person into a bowl. Add milk splash, salt & pepper.","Heat buttered pan over medium. Pour in eggs.","Stir gently 2–3 minutes until just set. Add cheese last 30 seconds.","Toast bread while eggs cook. Serve together."],tip:"Dad can do this while kids get dressed. Best for weekends and Fridays — the whole family eats together at the table.",pl:"2 eggs + cheese + toast = 24g protein. A classic, filling, real breakfast."},H2:{n:"Protein Pancakes + Turkey Sausage",i:"🥞",t:"Hot Plate",q:"Mix pancake batter with protein powder, cook on griddle. Heat sausage links.",pr:"32g",c:"$1.20",tm:"10 min",ing:["1 cup pancake mix","1 scoop protein powder","1 egg","3/4 cup milk","Turkey sausage links (2 per person)","Maple syrup","Butter for griddle"],st:["Mix pancake batter: pancake mix + protein powder + egg + milk. Stir until just combined.","Heat a buttered griddle over medium. Pour 1/4 cup portions.","Cook 2 min per side until golden. Meanwhile, heat turkey sausage in microwave or pan.","Stack pancakes, add butter + a drizzle of syrup. Serve with sausage links."],tip:"The protein powder makes these pancakes fill everyone up until lunch. Turkey sausage adds even more protein without the heaviness.",pl:"Protein pancakes + 2 turkey links = 32g protein. Limit syrup to 1 tbsp for Mom's plate."},H3:{n:"Breakfast Burritos (Batch or Fresh)",i:"🌯",t:"Hot Plate",q:"Scramble eggs + beans + cheese, wrap in tortilla. Can batch-freeze on Sunday.",pr:"22g",c:"$0.85",tm:"5 min fresh / 2 min frozen",ing:["2 eggs per burrito","2 tbsp black beans per burrito","2 tbsp shredded Mexican cheese","1 flour tortilla per burrito","Salsa for topping","Cooking spray"],st:["Scramble eggs in a sprayed pan over medium heat, 2 minutes.","Warm beans in microwave 30 seconds.","Warm tortilla 15 seconds in microwave.","Layer eggs, beans, cheese in tortilla. Add salsa. Fold and wrap.","BATCH VERSION: Make 10, wrap in foil, freeze. Microwave 90 sec from frozen."],tip:"Freeze a batch of 10 on Sunday — the kids grab one, zap it, and eat. That's a 2-minute hot protein breakfast on a school morning.",pl:"Each burrito = 22g protein from eggs + beans + cheese. One is enough for Mom. Kids may want 1–2."},G1:{n:"Yogurt Parfait + Granola + Banana",i:"🥣",t:"Grab & Go",q:"Scoop yogurt into bowl, top with granola + banana slices. 60 seconds.",pr:"18g",c:"$0.90",tm:"1 min",ing:["1 cup Greek yogurt","1/4 cup granola","1 banana sliced","1 tsp honey"],st:["Scoop Greek yogurt into a bowl or mason jar.","Top with granola and banana slices.","Drizzle honey. Eat at the table or take in the car."],tip:"Greek yogurt is the protein hero here — 18g in one cup. This is the fastest real breakfast possible.",pl:"18g protein from Greek yogurt. Add a hard-boiled egg on the side for 24g."},G2:{n:"PB Toast + Hard-Boiled Eggs + Fruit",i:"🍞",t:"Grab & Go",q:"Toast bread, spread PB, grab 2 hard-boiled eggs from fridge, grab an apple.",pr:"22g",c:"$0.65",tm:"2 min",ing:["2 slices whole wheat bread","2 tbsp peanut butter","2 hard-boiled eggs (from Sunday batch)","1 apple or banana"],st:["Toast 2 slices of whole wheat bread.","Spread peanut butter on toast.","Grab 2 hard-boiled eggs from the fridge.","Grab a piece of fruit. Eat and go."],tip:"Hard-boiled eggs last 5 days in the fridge. Peel a bunch on Sunday and put them in a container — it's the easiest protein grab all week.",pl:"22g protein from eggs + peanut butter. Fiber from whole wheat + apple. Keeps you full 4–5 hours."},G3:{n:"Cottage Cheese + Fruit + Almonds",i:"🥣",t:"Grab & Go",q:"Scoop cottage cheese, top with fruit and almonds. Done.",pr:"24g",c:"$0.80",tm:"1 min",ing:["1 cup cottage cheese","1/2 cup mixed berries or peach slices","2 tbsp almonds","1 tsp honey"],st:["Scoop cottage cheese into a bowl.","Top with berries or fruit.","Sprinkle almonds and drizzle honey.","Eat — this is quietly one of the highest-protein breakfasts in the book."],tip:"Cottage cheese has more protein per dollar than almost anything. Kids who are unsure can try it with peaches and honey — usually converts them.",pl:"24g protein from cottage cheese + almonds. Under 300 calories. A secret weapon breakfast."}};
const DIN={1:[{n:"Slow Cooker Pot Roast",cu:"Comfort Food",m:"Slow Cooker",co:3.8,sc:1,ing:["3 lb chuck roast","5 medium potatoes quartered","4 carrots cut in chunks","2 cups beef broth","2 tbsp Worcestershire sauce","1 tsp garlic powder","1 tsp paprika","Salt & pepper","2 tbsp olive oil"],st:["Season roast with garlic powder, paprika, salt & pepper on all sides.","Heat olive oil in a pan, sear roast 3 minutes per side until browned.","Place potatoes and carrots in slow cooker. Set roast on top.","Pour beef broth and Worcestershire over everything.","Cook LOW 8 hours or HIGH 4–5 hours until fork-tender.","Slice roast against the grain. Serve with veggies and broth ladled over."],tp:"Start this at 11am Sunday before church — it'll be perfect by dinner. The house will smell amazing when you get home.",pl:"1 palm-size portion of roast + load up on carrots. Half portion of potatoes."},{n:"BBQ Pork Tenderloin + Mashed Potatoes + Green Beans",cu:"BBQ",m:"Oven",co:3.1,ing:["2 lb pork tenderloin","1/2 cup BBQ sauce","1 tsp garlic powder","1 tsp paprika","5 medium potatoes","1/4 cup butter","1/2 cup milk","1 lb frozen green beans","Salt & pepper"],st:["Preheat oven to 400°F. Season tenderloin with garlic powder, paprika, salt & pepper.","Place on a lined baking sheet. Brush with half the BBQ sauce.","Roast 20–25 minutes until internal temp reaches 145°F. Brush with remaining BBQ sauce.","Meanwhile, boil cubed potatoes 15 minutes until tender. Drain, mash with butter and milk.","Steam green beans in microwave 4 minutes.","Slice tenderloin into medallions. Serve with mashed potatoes and green beans."],tp:"Pork tenderloin is one of the leanest, cheapest proteins at Walmart. Two pounds feeds the whole family with leftovers.",pl:"3–4 medallions + big portion of green beans. Half scoop of mashed potatoes."},{n:"Ground Beef Taco Bowls",cu:"Mexican",m:"Stovetop",co:2.6,ing:["1.5 lb ground beef","1 packet taco seasoning","1 can black beans drained","2 cups cooked rice","1 cup shredded Mexican cheese","1 cup salsa","Sour cream","Romaine lettuce shredded"],st:["Brown ground beef in a large skillet over medium-high heat, breaking into crumbles.","Drain excess fat. Add taco seasoning and 1/2 cup water. Simmer 5 minutes.","Warm rice and black beans separately.","Build bowls: rice base, seasoned beef, beans, cheese, salsa, lettuce, sour cream."],tp:"Let everyone build their own bowl — even the littlest kid can pile on what they like. Great way to use Sunday's rice batch.",pl:"Smaller rice portion, extra lettuce base. Full portions of beef, beans, salsa. Light on cheese and sour cream."},{n:"Chicken Fried Rice",cu:"Asian",m:"Stovetop",co:2.4,ing:["3 chicken breasts diced","3 cups cooked rice (day-old best)","2 eggs","1 cup frozen mixed veggies","3 tbsp soy sauce","1 tbsp sesame oil","1 tsp garlic powder","2 tbsp vegetable oil"],st:["Heat vegetable oil in large skillet or wok over high heat.","Cook diced chicken 5–6 minutes until cooked through. Remove and set aside.","Scramble eggs in same pan. Remove and chop roughly.","Add rice to hot pan. Cook 3–4 minutes, pressing flat to get crispy bits.","Add frozen veggies, cook 2 minutes. Add chicken and eggs back.","Drizzle soy sauce and sesame oil. Toss everything together. Serve hot."],tp:"Day-old rice fries WAY better than fresh. Use Sunday's batch — this is exactly why we cook extra.",pl:"Load up on chicken and veggies. Smaller rice portion. Still tastes amazing."},{n:"Cheeseburgers + Baked Fries",cu:"Comfort Food",m:"Stovetop/Oven",co:3.2,ing:["1.5 lb ground beef","5 burger buns","5 slices cheddar cheese","Romaine lettuce","4 large russet potatoes","2 tbsp olive oil","Ketchup, mustard","Salt & pepper"],st:["Preheat oven to 425°F. Cut potatoes into wedges, toss with olive oil, salt, pepper.","Spread fries on baking sheet. Bake 25–30 minutes, flipping halfway.","Form beef into 5 patties, season both sides. Cook in skillet over medium-high, 4 min per side.","Add cheese slice last minute, cover pan to melt.","Toast buns lightly. Assemble burgers with lettuce and condiments.","Serve with crispy baked fries."],tp:"Burger night is always a hit. Baked fries are healthier than fried and the kids love making their own burgers.",pl:"Lettuce wrap instead of bun. Full burger patty + cheese. Small portion of fries."},{n:"Baked Ziti with Ground Beef",cu:"Italian",m:"Oven",co:2.8,ing:["1 lb ground beef","1 lb ziti pasta","1 jar pasta sauce (24 oz)","2 cups shredded mozzarella","1/2 cup ricotta or cottage cheese","1 tsp Italian seasoning","1 tsp garlic powder","Salt & pepper"],st:["Preheat oven to 375°F. Cook ziti according to package, drain.","Brown ground beef, drain fat. Add pasta sauce, Italian seasoning, garlic powder.","In a 9x13 baking dish: half the ziti, half the meat sauce, dollops of ricotta, 1 cup mozzarella.","Repeat layers. Top with remaining mozzarella.","Bake 25 minutes until bubbly and golden on top.","Let rest 5 minutes before serving."],tp:"This feeds a crowd and the leftovers are even better the next day. Make it Friday night — no rush.",pl:"Smaller pasta portion, extra sauce and meat. The protein is in the beef and cheese."},{n:"Grilled Salmon + Asparagus + Rice",cu:"American",m:"Stovetop",co:4.5,ing:["2 lb salmon fillets","1 lb asparagus trimmed","2 cups cooked rice","2 tbsp olive oil","2 tbsp butter","2 cloves garlic minced (or 1 tsp garlic powder)","1 lemon","Salt & pepper"],st:["Season salmon fillets with salt, pepper, and garlic powder.","Heat olive oil in a large skillet over medium-high heat.","Cook salmon skin-side up 4 minutes, flip, cook 3–4 more minutes until flaky.","In another pan, heat butter. Sauté asparagus with garlic 4–5 minutes until tender-crisp.","Squeeze lemon over salmon and asparagus.","Serve over rice."],tp:"Salmon night is Saturday's treat. Thaw from freezer Friday night in the fridge. Worth the slightly higher cost.",pl:"Full salmon portion. Extra asparagus. Half portion of rice."}],2:[{n:"Slow Cooker Beef Stew + Biscuits",cu:"Comfort Food",m:"Slow Cooker",co:3.2,sc:1,ing:["2 lb chuck roast cubed","4 potatoes cubed","3 carrots sliced","2 cans diced tomatoes","2 cups beef broth","2 tbsp Worcestershire","1 tsp garlic powder","1 tsp paprika","Salt & pepper","1 can refrigerated biscuits"],st:["Place cubed beef in slow cooker.","Add potatoes, carrots, tomatoes, broth, Worcestershire, and seasonings.","Stir. Cook LOW 8 hours or HIGH 5 hours.","30 minutes before serving, bake biscuits per package directions.","Ladle stew into bowls, serve with warm biscuits."],tp:"Classic comfort food. The slow cooker does all the work. Biscuits from a can are 2 minutes of effort for huge satisfaction.",pl:"Load up on the broth and veggies. Smaller potato portion. One biscuit."},{n:"Slow Cooker Chicken Tacos",cu:"Mexican",m:"Slow Cooker",co:2.2,sc:1,ing:["2 lb chicken breasts","1 packet taco seasoning","1 cup salsa","1 can black beans","Flour tortillas","Shredded cheese, sour cream, lettuce"],st:["Place chicken breasts in slow cooker.","Pour salsa over chicken, sprinkle taco seasoning.","Cook LOW 6–8 hours or HIGH 3–4 hours.","Shred chicken with two forks.","Warm beans and tortillas. Build tacos with toppings."],tp:"This is the easiest slow cooker meal in the book. Set it before work, shred when you get home. Kids love building their own tacos.",pl:"Use lettuce wraps or one small tortilla. Load up on chicken and beans. Light on cheese."},{n:"Beef & Broccoli Stir Fry",cu:"Asian",m:"Stovetop",co:2.7,ing:["2 lb flank steak sliced thin","2 bags frozen broccoli","3 cups cooked rice","3 tbsp soy sauce","2 tbsp brown sugar","1 tbsp cornstarch","1 tsp garlic powder","1 tbsp sesame oil","2 tbsp vegetable oil"],st:["Mix soy sauce, brown sugar, cornstarch, garlic powder, and 1/4 cup water for sauce.","Heat vegetable oil in wok or large skillet over high heat.","Cook sliced beef 3–4 minutes until browned. Remove.","Cook broccoli in same pan 3 minutes. Pour sauce over.","Return beef to pan. Toss everything in sauce until thickened, about 2 minutes.","Serve over rice. Drizzle sesame oil."],tp:"Slice the steak thin against the grain for the most tender result. This rivals takeout and costs a fraction.",pl:"Double the broccoli, half the rice. Full portion of beef."},{n:"Chicken Parmesan + Spaghetti",cu:"Italian",m:"Stovetop/Oven",co:2.9,ing:["5 chicken breasts","1 cup Italian breadcrumbs","2 eggs beaten","1 jar pasta sauce","1 cup shredded mozzarella","1/2 cup Parmesan","1 lb spaghetti","Salt & pepper"],st:["Preheat oven to 400°F. Cook spaghetti per package.","Dip chicken in beaten eggs, then breadcrumbs. Press firmly.","Pan-fry breaded chicken in olive oil 3 minutes per side until golden.","Transfer to baking dish. Top each with sauce, mozzarella, and Parmesan.","Bake 15 minutes until cheese is melted and bubbly.","Serve over spaghetti with extra sauce."],tp:"Kids think this is a restaurant meal. The breadcrumb coating keeps the chicken juicy. Leftovers make great next-day sandwiches.",pl:"Full chicken breast. Smaller spaghetti portion. Extra sauce."},{n:"Slow Cooker Pulled Pork + Coleslaw Buns",cu:"BBQ",m:"Slow Cooker",co:2.7,sc:1,ing:["3 lb pork shoulder","1 cup BBQ sauce","1/2 cup apple cider vinegar","2 tbsp brown sugar","1 tsp garlic powder","1 tsp paprika","Hamburger buns","1 bag coleslaw mix","2 tbsp mayo","1 tbsp vinegar"],st:["Season pork with garlic powder, paprika, salt & pepper.","Place in slow cooker. Pour BBQ sauce and apple cider vinegar over.","Cook LOW 8–10 hours until falls apart.","Shred pork with two forks. Stir back into sauce.","Mix coleslaw: bag mix + mayo + vinegar.","Pile pork on buns, top with coleslaw."],tp:"Pork shoulder is one of the cheapest cuts at Walmart and feeds an army. The vinegar slaw cuts through the richness perfectly.",pl:"Open-face on half a bun. Pile on the coleslaw. Full portion of pork."},{n:"Baked Pork Chops + Sweet Potatoes + Corn",cu:"Comfort Food",m:"Oven",co:2.8,ing:["5 bone-in pork chops","3 large sweet potatoes","1 bag frozen corn","2 tbsp olive oil","1 tsp garlic powder","1 tsp paprika","1 tbsp brown sugar","Salt & pepper","Butter"],st:["Preheat oven to 400°F. Season pork chops with garlic powder, paprika, salt, pepper.","Place on one side of a lined sheet pan. Cube sweet potatoes, toss with olive oil and brown sugar, place on other side.","Bake 25–30 minutes until pork reaches 145°F and potatoes are tender.","Microwave corn 4 minutes in last few minutes.","Serve pork chops with sweet potatoes and buttered corn."],tp:"Sheet pan dinner — one pan, minimal cleanup. Sweet potatoes + brown sugar become candy-like in the oven.",pl:"Full pork chop. Big portion of sweet potatoes (they're nutrient-dense). Corn on the side."},{n:"Shrimp Stir Fry + Egg Rolls + Rice",cu:"Asian",m:"Stovetop",co:3.9,ing:["1 lb frozen shrimp (peeled)","2 cups frozen stir fry veggies","2 cups cooked rice","3 tbsp soy sauce","1 tbsp sesame oil","1 tsp garlic powder","1 tsp ground ginger","Frozen egg rolls (5–10)","2 tbsp vegetable oil"],st:["Thaw shrimp. Heat vegetable oil in wok over high heat.","Cook shrimp 2–3 minutes per side until pink. Remove.","Cook frozen veggies 3–4 minutes in same pan.","Return shrimp. Add soy sauce, garlic powder, ginger. Toss 1 minute.","Meanwhile, bake egg rolls per package directions.","Serve stir fry over rice with egg rolls on the side."],tp:"Saturday treat! Frozen shrimp + frozen egg rolls = minimal prep but feels like a special dinner.",pl:"Extra shrimp and veggies. Smaller rice portion. 1–2 egg rolls."}],3:[{n:"Whole Roasted Chicken + Roasted Veggies",cu:"Comfort Food",m:"Oven",co:2.8,ing:["1 whole chicken (4–5 lb)","5 medium potatoes quartered","3 carrots cut in chunks","2 tbsp olive oil","2 tbsp butter softened","1 tsp garlic powder","1 tsp paprika","1 tsp Italian seasoning","Salt & pepper","1 lemon halved"],st:["Preheat oven to 425°F. Pat chicken dry. Rub with softened butter and all seasonings.","Stuff cavity with lemon halves.","Place chicken in center of roasting pan. Surround with potatoes and carrots tossed in olive oil.","Roast 1 hour 15 minutes until thigh temp reaches 165°F and juices run clear.","Rest 10 minutes before carving. Serve with roasted veggies and pan juices."],tp:"A whole chicken is the best budget protein at Walmart. Save the carcass — you can make broth for the week.",pl:"White meat (breast) + load up on roasted veggies. Smaller potato portion."},{n:"Teriyaki Chicken + Rice + Broccoli",cu:"Asian",m:"Stovetop",co:2.5,ing:["3 chicken breasts sliced","2 cups cooked rice","2 bags frozen broccoli","1/3 cup teriyaki sauce","1 tbsp vegetable oil","1 tsp garlic powder","Sesame seeds for garnish"],st:["Heat oil in skillet over medium-high. Cook sliced chicken 5–6 minutes until done.","Add teriyaki sauce. Cook 2 more minutes until sauce thickens and glazes chicken.","Steam broccoli in microwave 4 minutes.","Serve teriyaki chicken over rice with broccoli. Sprinkle sesame seeds."],tp:"Bottled teriyaki sauce is the shortcut hero. Kids love the sweet glaze. This is faster than ordering takeout.",pl:"Full chicken portion. Extra broccoli. Half portion of rice."},{n:"Turkey Meatball Subs",cu:"Italian",m:"Oven",co:2.3,ing:["1.5 lb ground turkey","1/3 cup Italian breadcrumbs","1 egg","1 tsp garlic powder","1 tsp Italian seasoning","1 jar pasta sauce","5 sub rolls","1 cup shredded mozzarella","Salt & pepper"],st:["Preheat oven to 400°F. Mix turkey, breadcrumbs, egg, garlic, Italian seasoning, salt & pepper.","Form into 20 meatballs. Place on lined baking sheet.","Bake 20 minutes until cooked through.","Heat pasta sauce in a pot. Add baked meatballs to sauce, simmer 5 minutes.","Slice sub rolls. Fill with meatballs and sauce. Top with mozzarella.","Optional: broil open-face 2 minutes to melt cheese."],tp:"Ground turkey is leaner and cheaper than beef for meatballs. Kids love the sub format — it's like eating at a restaurant.",pl:"3–4 meatballs in sauce on half a sub roll. Extra sauce. The protein is in the turkey."},{n:"BBQ Chicken Drumsticks + Mac & Cheese + Coleslaw",cu:"BBQ",m:"Oven",co:2.6,ing:["10 chicken drumsticks","1 cup BBQ sauce","1 tsp garlic powder","1 tsp paprika","3 boxes mac & cheese","1 bag coleslaw mix","2 tbsp mayo","1 tbsp vinegar","Salt & pepper"],st:["Preheat oven to 400°F. Season drumsticks with garlic powder, paprika, salt & pepper.","Place on lined baking sheet. Bake 35 minutes.","Brush with BBQ sauce. Bake 10 more minutes until sticky and caramelized.","Cook mac & cheese per box directions during last 10 minutes.","Mix coleslaw: mix + mayo + vinegar.","Serve 2 drumsticks per person with mac & cheese and slaw."],tp:"Drumsticks are the cheapest chicken at Walmart and kids love eating them with their hands. The BBQ glaze is irresistible.",pl:"2 drumsticks (remove skin for fewer calories). Small mac portion. Big coleslaw serving."},{n:"Pork Carnitas Tacos",cu:"Mexican",m:"Slow Cooker",co:2.5,sc:1,ing:["3 lb pork shoulder","1 tbsp cumin","1 tsp garlic powder","1 tsp paprika","1 tsp chili powder (mild)","1/2 cup chicken broth","Juice of 2 limes","Flour tortillas","Cilantro, lime wedges, cheese"],st:["Season pork with cumin, garlic, paprika, chili powder, salt & pepper.","Place in slow cooker. Add chicken broth and lime juice.","Cook LOW 8 hours until meat shreds easily.","Shred pork. For crispy edges, broil shredded pork on a sheet pan 3–4 minutes.","Serve in warm tortillas with cilantro, lime, and cheese."],tp:"The broiling step is optional but makes a huge difference — crispy edges are what make real carnitas.",pl:"Lettuce wraps or 1 small tortilla. Load up on carnitas. The pork is lean once shredded."},{n:"Beef Chili + Cornbread",cu:"Comfort Food",m:"Stovetop",co:2.6,ing:["1.5 lb ground beef","2 cans diced tomatoes","2 cans black beans drained","1 can tomato sauce","2 tsp chili powder (mild)","1 tsp cumin","1 tsp garlic powder","1 box cornbread mix","Shredded cheese for topping"],st:["Brown ground beef in a large pot, drain fat.","Add tomatoes, beans, tomato sauce, and all seasonings.","Bring to a boil, then simmer 20–30 minutes.","While chili simmers, prepare cornbread per box directions. Bake 15–20 minutes.","Ladle chili into bowls. Top with shredded cheese.","Serve with warm cornbread."],tp:"Chili is the ultimate budget meal — beans stretch the beef, and it tastes even better reheated the next day.",pl:"Full bowl of chili (beans are protein + fiber). One piece of cornbread."},{n:"BBQ Chicken Thighs + Baked Potato Bar",cu:"American",m:"Oven",co:3.2,ing:["10 bone-in chicken thighs","1 cup BBQ sauce","1 tsp garlic powder","1 tsp paprika","5 large russet potatoes","Butter, sour cream, shredded cheese","Frozen broccoli","Salt & pepper"],st:["Preheat oven to 400°F. Season thighs with garlic, paprika, salt & pepper.","Poke potatoes with fork, microwave 10 minutes until soft (or bake alongside chicken).","Place thighs on sheet pan. Bake 30 minutes, brush with BBQ sauce, bake 10 more.","Steam broccoli in microwave.","Set up potato bar: butter, sour cream, cheese, broccoli.","Everyone builds their own loaded potato alongside BBQ thighs."],tp:"Baked potato bar is always a family hit. Everyone gets exactly what they want. Kids love loading them up.",pl:"Full chicken thigh (remove skin). Potato with broccoli and light sour cream. Skip the butter."}],4:[{n:"Chicken & Dumplings",cu:"Comfort Food",m:"Stovetop",co:2.8,ing:["3 chicken breasts","4 cups chicken broth","2 cups frozen mixed veggies","1 can refrigerated biscuit dough","1/4 cup flour","1/4 cup butter","1/2 cup milk","1 tsp garlic powder","Salt & pepper"],st:["Poach chicken in broth 15 minutes until cooked. Shred with forks.","In same pot, melt butter. Stir in flour to make a roux, cook 2 minutes.","Add milk, stirring until thick. Add broth back, shredded chicken, and veggies.","Cut each biscuit into 4 pieces. Drop into simmering broth.","Cover and simmer 15 minutes until dumplings are fluffy and cooked through.","Serve in deep bowls."],tp:"This is pure comfort food — warm, thick, and filling. The biscuit dumplings are what make it special. Kids love them.",pl:"Load up on chicken and veggies in broth. 3–4 dumpling pieces. The broth is filling and low-calorie."},{n:"Classic Lasagna + Garlic Bread + Salad",cu:"Italian",m:"Oven",co:2.9,ing:["1 lb ground beef","12 lasagna noodles","1 jar pasta sauce","2 cups ricotta","2 cups shredded mozzarella","1/2 cup Parmesan","1 egg","1 tsp Italian seasoning","Frozen garlic bread","Romaine lettuce"],st:["Preheat oven to 375°F. Cook noodles per package.","Brown beef, drain fat. Add pasta sauce and Italian seasoning.","Mix ricotta, egg, and half the mozzarella.","In a 9x13 dish: thin sauce layer, noodles, ricotta mix, meat sauce. Repeat 3 times.","Top with remaining mozzarella and Parmesan.","Cover with foil. Bake 35 minutes covered, 10 uncovered. Bake garlic bread alongside."],tp:"MAKE THIS ON SUNDAY. Refrigerate unbaked. Monday: pop it straight into the oven. Hot lasagna on a Monday for zero effort.",pl:"One square of lasagna. Big side salad with light dressing. Half a piece of garlic bread."},{n:"Turkey Burgers + Sweet Potato Fries",cu:"Comfort Food",m:"Stovetop/Oven",co:2.6,ing:["1.5 lb ground turkey","5 burger buns","Lettuce, tomato","3 large sweet potatoes","2 tbsp olive oil","1 tsp garlic powder","Salt & pepper","Condiments of choice"],st:["Preheat oven to 425°F. Cut sweet potatoes into fries. Toss with olive oil, salt, pepper.","Spread on baking sheet. Bake 25 minutes, flipping halfway.","Form turkey into 5 patties. Season with garlic powder, salt, pepper.","Cook in skillet over medium-high 5 minutes per side until cooked through.","Toast buns. Assemble burgers with lettuce and tomato.","Serve with sweet potato fries."],tp:"Turkey burgers are leaner than beef and kids can't tell the difference once they're loaded with toppings.",pl:"Full turkey patty. Lettuce wrap option. Sweet potato fries are nutrient-dense, enjoy a full portion."},{n:"Sheet Pan Chicken Fajitas",cu:"Mexican",m:"Oven",co:2.7,ing:["3 chicken breasts sliced","3 bell peppers sliced","2 tbsp olive oil","1 packet fajita seasoning","Flour tortillas","Shredded cheese, sour cream, salsa","Lime wedges"],st:["Preheat oven to 400°F. Toss sliced chicken and peppers with olive oil and fajita seasoning.","Spread on a sheet pan in a single layer.","Roast 20–25 minutes until chicken is cooked and peppers are tender.","Warm tortillas in microwave 30 seconds.","Serve family-style — everyone builds their own fajitas."],tp:"One sheet pan, done in 25 minutes. The roasted peppers get sweet and slightly charred. Everyone loves building their own.",pl:"Load up on chicken and peppers. Use 1 small tortilla or lettuce wrap. Light on cheese."},{n:"Pork Fried Rice",cu:"Asian",m:"Stovetop",co:2.4,ing:["1.5 lb pork loin sliced thin","3 cups cooked rice (day-old)","2 eggs","1 cup frozen peas and carrots","3 tbsp soy sauce","1 tbsp sesame oil","2 tbsp vegetable oil","1 tsp garlic powder"],st:["Heat vegetable oil in wok over high heat. Cook sliced pork 4–5 minutes. Remove.","Scramble eggs in same pan. Remove and chop.","Add rice to hot pan. Press flat, cook 3 minutes for crispy bits.","Add frozen veggies, cook 2 minutes. Add pork and eggs back.","Drizzle soy sauce and sesame oil. Toss and serve."],tp:"Another great use for Sunday's rice batch. Pork + eggs = double protein. This one disappears fast.",pl:"Extra pork and veggies. Smaller rice portion. Still incredibly satisfying."},{n:"BBQ Baby Back Ribs + Baked Potato",cu:"BBQ",m:"Oven",co:4.2,ing:["2 racks baby back ribs","1 cup BBQ sauce","2 tbsp brown sugar","1 tsp garlic powder","1 tsp paprika","5 large potatoes","Butter, sour cream","1 bag frozen corn","Salt & pepper"],st:["Preheat oven to 300°F. Remove membrane from back of ribs.","Season with brown sugar, garlic, paprika, salt, pepper. Wrap tightly in foil.","Bake 2.5–3 hours until tender.","Unwrap, brush with BBQ sauce. Broil 3–5 minutes until caramelized.","Bake potatoes: microwave 10 min or bake alongside ribs. Microwave corn.","Serve ribs with loaded baked potatoes and corn."],tp:"FRIDAY SPECIAL: Dad starts ribs at 3pm when everyone's home. They're ready for a 6pm family feast. Worth the wait!",pl:"3–4 rib bones. Baked potato with broccoli topping instead of butter. Corn on the side."},{n:"Lemon Butter Salmon + Asparagus",cu:"American",m:"Stovetop",co:4.5,ing:["2 lb salmon fillets","1 lb asparagus","3 tbsp butter","2 cloves garlic (or 1 tsp powder)","1 lemon","2 cups cooked rice","2 tbsp olive oil","Salt & pepper"],st:["Season salmon with salt, pepper. Heat olive oil in skillet over medium-high.","Cook salmon 4 minutes per side until flaky.","Meanwhile, melt butter in another pan. Add garlic, cook 1 minute.","Add asparagus, cook 4–5 minutes. Squeeze half the lemon over.","Squeeze remaining lemon over salmon.","Serve salmon and asparagus over rice with pan juices drizzled over."],tp:"Saturday's premium dinner. Simple but elegant. The lemon butter makes everything restaurant-quality.",pl:"Full salmon fillet. Extra asparagus. Half portion of rice. The healthy fats in salmon are great for you."}],5:[{n:"Slow Cooker Beef Bulgogi Bowls",cu:"Asian",m:"Slow Cooker",co:3,sc:1,ing:["2 lb flank steak sliced thin","1/3 cup soy sauce","2 tbsp brown sugar","1 tbsp sesame oil","1 tsp garlic powder","1 tsp ground ginger","3 cups cooked rice","Frozen stir fry veggies","Sesame seeds, green onions"],st:["Mix soy sauce, brown sugar, sesame oil, garlic, ginger for marinade.","Place sliced steak in slow cooker. Pour marinade over.","Cook LOW 6–7 hours or HIGH 3–4 hours.","Cook rice and steam veggies in last 15 minutes.","Build bowls: rice, bulgogi beef, veggies, sesame seeds."],tp:"This tastes like a Korean restaurant bowl. The slow cooker makes the beef incredibly tender.",pl:"Double veggies, smaller rice. Full portion of bulgogi beef."},{n:"Steak + Mashed Potatoes + Corn",cu:"Comfort Food",m:"Stovetop",co:4.8,ing:["2 lb sirloin steak","5 medium potatoes","1/4 cup butter","1/2 cup milk","1 bag frozen corn","2 tbsp olive oil","1 tsp garlic powder","Salt & pepper"],st:["Bring steak to room temp 20 min. Season generously with salt, pepper, garlic.","Boil cubed potatoes 15 minutes. Drain, mash with butter and milk.","Heat olive oil in cast iron or heavy skillet until smoking hot.","Cook steak 4 minutes per side for medium. Rest 5 minutes before slicing.","Microwave corn 4 minutes with butter.","Slice steak against the grain. Serve with mashed potatoes and corn."],tp:"Steak night! This is the splurge dinner of the week. Sirloin is the best balance of flavor and price at Walmart.",pl:"Full steak portion. Smaller mashed portion. Corn on the side. Steak is pure protein."},{n:"Pork Street Tacos + Rice + Beans",cu:"Mexican",m:"Slow Cooker",co:2.5,sc:1,ing:["2 lb pork loin","1 packet taco seasoning","1/2 cup chicken broth","Small corn or flour tortillas","1 can pinto beans","2 cups cooked rice","Cilantro, lime, salsa"],st:["Place pork in slow cooker. Add taco seasoning and broth.","Cook LOW 7–8 hours. Shred with forks.","Warm beans and rice.","Warm small tortillas. Fill with shredded pork.","Top with cilantro, lime squeeze, and salsa.","Serve with rice and beans on the side."],tp:"Street-style small tacos let everyone have 2–3 instead of one big one. Kids love the pick-up-and-eat format.",pl:"Use small corn tortillas (fewer calories). Load pork. Beans on the side for fiber."},{n:"Baked Chicken Thighs + Pasta + Salad",cu:"Italian",m:"Oven",co:2.6,ing:["10 bone-in chicken thighs","1 lb pasta (penne or rotini)","1 jar pasta sauce","1/2 cup Parmesan","Romaine lettuce","Italian dressing","1 tsp Italian seasoning","1 tsp garlic powder","Salt & pepper"],st:["Preheat oven to 400°F. Season thighs with Italian seasoning, garlic, salt, pepper.","Place on sheet pan, bake 35–40 minutes until skin is crispy and cooked through.","Cook pasta, drain. Toss with warmed pasta sauce and Parmesan.","Make a simple salad with romaine and dressing.","Serve 2 thighs per person with pasta and salad."],tp:"Bone-in chicken thighs are $1.49/lb at Walmart — the best value protein. The bone keeps them juicy.",pl:"2 thighs (remove skin). Smaller pasta portion. Big side salad."},{n:"Korean Ground Beef Bowls",cu:"Asian",m:"Stovetop",co:2.6,ing:["1.5 lb ground beef","3 cups cooked rice","1/3 cup soy sauce","2 tbsp brown sugar","1 tbsp sesame oil","1 tsp garlic powder","1 tsp ground ginger","Frozen stir fry veggies","Sesame seeds"],st:["Brown ground beef in skillet, drain fat.","Mix soy sauce, brown sugar, sesame oil, garlic, ginger. Pour over beef.","Simmer 3–4 minutes until sauce thickens.","Steam frozen veggies in microwave.","Build bowls: rice, Korean beef, veggies. Top with sesame seeds."],tp:"This tastes gourmet but uses basic ground beef. Ready in 15 minutes. The sweet-savory sauce is addictive.",pl:"Double veggies. Smaller rice portion. Full beef portion."},{n:"Homemade BBQ Chicken Pizza",cu:"BBQ",m:"Oven",co:2.4,ing:["2 store-bought pizza dough (or Walmart deli dough)","1/2 cup BBQ sauce","2 cooked chicken breasts shredded","2 cups shredded mozzarella","1/4 cup Parmesan","Fresh cilantro (optional)"],st:["Preheat oven to 450°F. Roll out dough on floured surface.","Place on greased baking sheet or pizza stone.","Spread BBQ sauce as base instead of pizza sauce.","Top with shredded chicken, mozzarella, and Parmesan.","Bake 12–15 minutes until crust is golden and cheese bubbles.","Top with fresh cilantro if desired. Slice and serve."],tp:"FRIDAY PIZZA NIGHT! Let the kids help top their own. This is the meal they'll remember all week.",pl:"2 slices. Side salad to fill up. The chicken gives this pizza real protein."},{n:"Sheet Pan Pork Tenderloin + Sweet Potatoes",cu:"Mexican",m:"Oven",co:3.5,ing:["2 lb pork tenderloin","3 large sweet potatoes cubed","2 tbsp olive oil","1 tsp cumin","1 tsp paprika","1 tsp garlic powder","1 bag frozen green beans","Salt & pepper"],st:["Preheat oven to 400°F. Season tenderloin with cumin, paprika, garlic, salt, pepper.","Toss sweet potato cubes with olive oil and salt on sheet pan.","Place tenderloin in center, sweet potatoes around edges.","Roast 25–30 minutes until pork reaches 145°F.","Steam green beans in microwave during last 5 minutes.","Slice tenderloin. Serve with roasted sweet potatoes and green beans."],tp:"Sheet pan = minimal cleanup. The sweet potatoes caramelize beautifully next to the pork. Leftovers are great for lunch.",pl:"Full portion of sliced pork. Big serving of sweet potatoes. Green beans on the side."}],6:[{n:"Slow Cooker Chicken Tortilla Soup",cu:"Mexican",m:"Slow Cooker",co:2.5,sc:1,ing:["2 lb chicken breasts","2 cans diced tomatoes","1 can black beans","1 cup frozen corn","1 cup chicken broth","1 packet taco seasoning","Tortilla chips","Shredded cheese, sour cream","Lime wedges"],st:["Place chicken in slow cooker. Add tomatoes, beans, corn, broth, and taco seasoning.","Cook LOW 6–8 hours or HIGH 3–4 hours.","Shred chicken with two forks in the pot. Stir.","Ladle into bowls. Top with crushed tortilla chips, cheese, sour cream, lime."],tp:"This soup is warm, filling, and the toppings make it feel festive. Kids love crushing their own chips on top.",pl:"Full bowl of soup (it's already lean). Fewer chips. Extra lime for flavor."},{n:"Honey Garlic Pork Chops + Green Beans + Rice",cu:"Comfort Food",m:"Stovetop",co:2.9,ing:["5 bone-in pork chops","1/3 cup honey","3 tbsp soy sauce","1 tsp garlic powder","2 tbsp butter","2 cups cooked rice","1 lb frozen green beans","Salt & pepper"],st:["Season pork chops with garlic powder, salt, pepper.","Melt butter in skillet over medium-high. Sear chops 4 min per side.","Mix honey and soy sauce. Pour over chops, simmer 2 minutes until glazed.","Steam green beans in microwave.","Serve glazed pork chops over rice with green beans."],tp:"The honey-soy glaze is sweet enough for kids but sophisticated enough for adults. Five-star taste, fifteen-minute dinner.",pl:"Full pork chop. Extra green beans. Smaller rice portion."},{n:"Hawaiian Chicken + Rice + Broccoli",cu:"Asian",m:"Stovetop",co:2.7,ing:["3 chicken breasts diced","1 can pineapple chunks (juice reserved)","1/3 cup teriyaki sauce","1 tbsp cornstarch","2 cups cooked rice","2 bags frozen broccoli","1 tbsp vegetable oil"],st:["Mix teriyaki sauce, pineapple juice, and cornstarch for sauce.","Heat oil in skillet. Cook diced chicken 5–6 minutes.","Add pineapple chunks and sauce. Simmer 3 minutes until thickened.","Steam broccoli in microwave.","Serve Hawaiian chicken over rice with broccoli."],tp:"The pineapple makes this taste tropical. Canned pineapple is cheap and the juice becomes the sauce. Kids go crazy for this one.",pl:"Full chicken and pineapple. Extra broccoli. Smaller rice portion."},{n:"Ground Beef Enchiladas",cu:"Mexican",m:"Oven",co:2.7,ing:["1.5 lb ground beef","1 packet taco seasoning","1 can enchilada sauce","10 flour tortillas","2 cups shredded Mexican cheese","1 can black beans","Sour cream, salsa"],st:["Brown beef, drain. Add taco seasoning and 1/2 cup water, simmer 5 minutes.","Mix beef with black beans and half the cheese.","Fill tortillas with mixture, roll up. Place seam-down in a 9x13 dish.","Pour enchilada sauce over top. Sprinkle remaining cheese.","Bake at 375°F for 20 minutes until bubbly.","Serve with sour cream and salsa."],tp:"Make enchiladas on a weeknight — they're faster than you think. Rolled and in the oven in 15 minutes.",pl:"2 enchiladas (instead of 3). Extra salsa. Side of steamed veggies."},{n:"Baked Rigatoni with Italian Sausage",cu:"Italian",m:"Oven",co:2.9,ing:["1 lb rigatoni pasta","1 lb Italian sausage","1 jar pasta sauce","2 cups shredded mozzarella","1/2 cup Parmesan","1 tsp Italian seasoning","Romaine for side salad"],st:["Preheat oven to 375°F. Cook rigatoni, drain.","Brown Italian sausage in skillet, breaking into pieces. Drain fat.","Mix pasta, sausage, pasta sauce, Italian seasoning, and 1 cup mozzarella.","Pour into 9x13 dish. Top with remaining mozzarella and Parmesan.","Bake 20 minutes until cheese is melted and bubbly.","Serve with a simple side salad."],tp:"Baked pasta is crowd-pleasing comfort food. The Italian sausage adds incredible flavor without extra work.",pl:"Smaller pasta serving. Extra salad. The sausage has plenty of protein."},{n:"BBQ Smoked Sausage + Roasted Potatoes + Corn",cu:"BBQ",m:"Oven",co:2.8,ing:["2 pkg smoked sausage sliced","5 medium potatoes cubed","1 bag frozen corn","2 tbsp olive oil","1 tsp garlic powder","1 tsp paprika","BBQ sauce for dipping","Salt & pepper"],st:["Preheat oven to 400°F. Toss cubed potatoes with olive oil, garlic, paprika, salt, pepper.","Spread on sheet pan. Bake 15 minutes.","Add sliced sausage to sheet pan. Bake 15 more minutes until potatoes are crispy.","Microwave corn 4 minutes.","Serve with BBQ sauce for dipping."],tp:"Smoked sausage + sheet pan = a 5-minute prep dinner. Let kids dip their sausage slices in BBQ sauce — they love it.",pl:"Full sausage portion. Moderate potato portion. Corn and extra veggies on the side."},{n:"Slow Cooker BBQ Beef Short Ribs + Mashed Potatoes",cu:"American",m:"Slow Cooker",co:3.4,sc:1,ing:["3 lb beef short ribs","1 cup BBQ sauce","1/2 cup beef broth","2 tbsp brown sugar","1 tsp garlic powder","5 medium potatoes","1/4 cup butter","1/2 cup milk","Salt & pepper"],st:["Season short ribs with garlic, salt, pepper. Place in slow cooker.","Mix BBQ sauce, broth, and brown sugar. Pour over ribs.","Cook LOW 8 hours until ribs are fall-off-the-bone tender.","Boil and mash potatoes with butter and milk during last 20 minutes.","Serve ribs over mashed potatoes with sauce ladled over."],tp:"Saturday's slow cooker feast. Start this in the morning, go to Walmart, come home to ribs. The house smells amazing all day.",pl:"Full rib portion. Smaller mashed potato serving. Add a green veggie side."}],7:[{n:"Slow Cooker Pot Roast with Rich Gravy",cu:"Comfort Food",m:"Slow Cooker",co:3.8,sc:1,ing:["3 lb chuck roast","5 medium potatoes quartered","4 carrots chunked","2 cups beef broth","1 packet onion soup mix (check: no onion pieces)","2 tbsp Worcestershire","2 tbsp olive oil","Salt & pepper","2 tbsp cornstarch for gravy"],st:["Sear seasoned roast in hot olive oil, 3 minutes per side.","Place potatoes and carrots in slow cooker. Set roast on top.","Mix broth, soup mix, Worcestershire. Pour over.","Cook LOW 8 hours.","Remove roast and veggies. Mix cornstarch + 2 tbsp cold water, stir into cooking liquid.","Simmer 5 minutes for thick gravy. Slice roast, serve with veggies and gravy."],tp:"The cornstarch gravy at the end turns this from good to incredible. Save leftovers for hot beef sandwiches tomorrow.",pl:"Palm-size roast portion. Load up on carrots. Half potato portion. Gravy has minimal calories."},{n:"One-Pan Chicken Piccata + Pasta",cu:"Italian",m:"Stovetop",co:2.8,ing:["3 chicken breasts halved thin","1/2 cup flour for dredging","3 tbsp butter","2 tbsp olive oil","1/3 cup chicken broth","Juice of 2 lemons","2 tbsp capers","1 lb angel hair pasta","Salt & pepper","Parsley"],st:["Cook pasta, drain, reserve 1/2 cup pasta water.","Season chicken, dredge in flour. Heat oil + 1 tbsp butter in skillet.","Cook chicken 3–4 minutes per side. Remove.","Add broth, lemon juice, capers. Simmer 3 minutes, scraping pan.","Add remaining butter. Return chicken to pan.","Serve chicken over pasta with sauce ladled over. Garnish with parsley."],tp:"Piccata sounds fancy but it's a 20-minute dinner. The lemon-butter-caper sauce is addictive. Kids love the tangy flavor.",pl:"Full chicken portion. Smaller pasta. Extra sauce — it's mostly lemon and broth."},{n:"BBQ Chicken Thighs + Roasted Potatoes + Corn",cu:"BBQ",m:"Oven",co:2.8,ing:["10 bone-in chicken thighs","1 cup BBQ sauce","5 medium potatoes cubed","2 tbsp olive oil","1 bag frozen corn","1 tsp garlic powder","1 tsp paprika","Salt & pepper"],st:["Preheat oven to 400°F. Season thighs. Toss potatoes with oil and seasonings.","Place thighs and potatoes on sheet pan.","Bake 30 minutes. Brush thighs with BBQ sauce. Bake 10 more minutes.","Microwave corn 4 minutes.","Serve 2 thighs per person with crispy potatoes and corn."],tp:"Sheet pan BBQ — barely any cleanup. The potatoes get crispy in the chicken drippings.",pl:"2 thighs (skin removed). Full potato serving (they're roasted, not fried). Corn on the side."},{n:"Slow Cooker Green Chile Chicken Burritos",cu:"Mexican",m:"Slow Cooker",co:2.6,sc:1,ing:["2 lb chicken breasts","1 can green enchilada sauce","1 can diced green chiles (mild)","1 tsp cumin","1 tsp garlic powder","Large flour tortillas","Shredded cheese, sour cream","Rice, black beans"],st:["Place chicken in slow cooker. Pour green enchilada sauce and green chiles over.","Add cumin and garlic powder. Cook LOW 6–8 hours.","Shred chicken in pot. Stir.","Warm tortillas, rice, and beans.","Build burritos: rice, chicken, beans, cheese, sour cream. Fold and wrap."],tp:"Green chile chicken is comfort food with a mild tangy flavor. The slow cooker does all the heavy lifting.",pl:"Use smaller tortilla. Load up on chicken and beans. Light on cheese and sour cream."},{n:"Baked Salmon Patties + Coleslaw + Rice",cu:"American",m:"Stovetop",co:3,ing:["2 cans salmon (14 oz each)","1/3 cup Italian breadcrumbs","1 egg","1 tsp garlic powder","2 cups cooked rice","1 bag coleslaw mix","2 tbsp mayo","1 tbsp vinegar","2 tbsp olive oil","Salt & pepper"],st:["Drain salmon. Mix with breadcrumbs, egg, garlic, salt, pepper. Form into 10 patties.","Heat olive oil in skillet. Cook patties 3–4 minutes per side until golden and crispy.","Mix coleslaw: bag + mayo + vinegar.","Serve 2 salmon patties per person with rice and coleslaw."],tp:"Canned salmon is budget-friendly and loaded with omega-3s. The patties have a crispy outside that kids love.",pl:"2 salmon patties. Big coleslaw serving. Smaller rice portion."},{n:"Pork Fried Rice with Egg",cu:"Asian",m:"Stovetop",co:2.4,ing:["1.5 lb pork loin sliced","3 cups cooked rice (day-old)","3 eggs","1 cup frozen peas and carrots","3 tbsp soy sauce","1 tbsp sesame oil","2 tbsp vegetable oil","1 tsp garli
