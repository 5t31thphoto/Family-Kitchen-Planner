<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Kitchen">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233A6B52'/><text x='50' y='68' text-anchor='middle' font-size='55'>🍳</text></svg>">
<title>The Family Kitchen — 7-Week Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FDF6EC;--warm:#FAF0E1;--peach:#FDDCB5;--coral:#E8856C;--rust:#C2553A;
  --forest:#3A6B52;--sage:#7DA88B;--olive:#5C7A56;--dark:#2C2417;--mid:#5E4B35;
  --sand:#E8DCC8;--light-sage:#D4E4D9;--white:#FFFDF9;--card:#FFFFFF;
  --shadow:0 2px 12px rgba(44,36,23,0.08);--shadow-lg:0 8px 30px rgba(44,36,23,0.12);
  --radius:14px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--cream);color:var(--dark);line-height:1.55;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* HEADER */
.header{background:linear-gradient(135deg,var(--forest) 0%,var(--olive) 100%);color:var(--white);padding:28px 20px 22px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(58,107,82,0.3)}
.header h1{font-family:Georgia,'Times New Roman',serif;font-size:1.6em;font-weight:400;letter-spacing:.5px}
.header .sub{font-size:.78em;opacity:.8;margin-top:4px;font-weight:400}

/* NAV TABS */
.nav{display:flex;gap:0;background:var(--white);border-bottom:1px solid var(--sand);position:sticky;top:78px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex:none;padding:13px 18px;font-size:.82em;font-weight:600;border:none;background:transparent;color:var(--mid);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;font-family:inherit}
.nav button.active{color:var(--forest);border-bottom-color:var(--forest);background:var(--light-sage)}
.nav button:hover:not(.active){background:var(--warm)}

/* WEEK SELECTOR */
.week-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;background:var(--warm);border-bottom:1px solid var(--sand)}
.week-bar button{width:40px;height:40px;border-radius:50%;border:2px solid var(--sand);background:var(--white);font-weight:700;font-size:.85em;cursor:pointer;color:var(--mid);transition:all .2s;font-family:inherit}
.week-bar button.active{background:var(--forest);color:var(--white);border-color:var(--forest);transform:scale(1.1)}
.week-bar button:hover:not(.active){border-color:var(--forest);color:var(--forest)}
.week-label{font-weight:700;font-size:.85em;color:var(--mid);margin:0 6px}

/* PANELS */
.panel{display:none;padding:16px;max-width:800px;margin:0 auto}
.panel.active{display:block}

/* DAY STRIP */
.day-strip{display:flex;gap:6px;padding:0 0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex:none;padding:10px 14px;border-radius:var(--radius);border:2px solid var(--sand);background:var(--white);cursor:pointer;text-align:center;transition:all .2s;min-width:52px}
.day-btn .dow{font-size:.65em;font-weight:700;text-transform:uppercase;color:var(--mid);letter-spacing:.5px}
.day-btn .dname{font-size:.82em;font-weight:600;color:var(--dark);margin-top:2px}
.day-btn.active{background:var(--coral);border-color:var(--coral)}
.day-btn.active .dow,.day-btn.active .dname{color:var(--white)}
.day-btn:hover:not(.active){border-color:var(--coral)}
.day-btn.sunday{border-color:var(--sage)}
.day-btn.sunday.active{background:var(--forest);border-color:var(--forest)}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(232,220,200,0.5)}
.card h3{font-family:Georgia,'Times New Roman',serif;font-size:1.15em;font-weight:400;margin-bottom:10px;color:var(--dark)}
.card-label{display:inline-block;font-size:.65em;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.label-breakfast{background:#FFF3E0;color:#E65100}
.label-dinner{background:#E8F5E9;color:#2E7D32}
.label-workout{background:#E3F2FD;color:#1565C0}
.label-schedule{background:#F3E5F5;color:#7B1FA2}
.label-prep{background:#FFF8E1;color:#F57F17}
.label-shop{background:#FBE9E7;color:var(--rust)}

.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.meta-tag{font-size:.75em;padding:4px 10px;border-radius:20px;background:var(--warm);color:var(--mid);font-weight:600}

/* SCHEDULE TABLE */
.sched-table{width:100%;font-size:.82em}
.sched-table tr{border-bottom:1px solid var(--warm)}
.sched-table td{padding:8px 6px;vertical-align:top}
.sched-table .time{font-weight:700;color:var(--forest);white-space:nowrap;width:70px;font-size:.9em}
.sched-table .event{font-weight:600;color:var(--dark)}
.sched-table .details{color:var(--mid);font-size:.92em;margin-top:2px}
.sched-highlight{background:var(--light-sage);border-radius:6px}

/* RECIPE */
.ingredients{columns:2;column-gap:16px;margin:10px 0}
.ingredients li{font-size:.85em;padding:3px 0;break-inside:avoid;list-style:none;position:relative;padding-left:18px}
.ingredients li::before{content:'•';position:absolute;left:4px;color:var(--coral);font-weight:700}
.steps{counter-reset:step;margin:10px 0}
.steps li{font-size:.85em;padding:6px 0 6px 32px;position:relative;list-style:none;border-bottom:1px solid var(--warm)}
.steps li::before{counter-increment:step;content:counter(step);position:absolute;left:0;width:24px;height:24px;background:var(--forest);color:var(--white);border-radius:50%;text-align:center;line-height:24px;font-size:.75em;font-weight:700}
.tip{background:#FFF8E1;border-left:4px solid #F9A825;padding:10px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:.83em;margin:10px 0;color:var(--mid)}
.weight-plate{background:var(--light-sage);border-left:4px solid var(--forest);padding:10px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:.83em;margin:10px 0;color:var(--olive)}

/* SHOPPING LIST */
.shop-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--warm);font-size:.85em;gap:10px}
.shop-item label{flex:1;cursor:pointer;display:flex;align-items:center;gap:10px}
.shop-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--forest);cursor:pointer;flex:none}
.shop-item .qty{color:var(--mid);font-size:.9em;min-width:65px;text-align:right}
.shop-item .price{color:var(--coral);font-weight:700;font-size:.9em;min-width:55px;text-align:right}
.shop-item.checked label span{text-decoration:line-through;opacity:.5}
.shop-total{font-weight:700;font-size:1em;padding:14px 0;text-align:right;color:var(--forest);border-top:2px solid var(--forest)}
.shop-category{font-weight:700;font-size:.8em;text-transform:uppercase;letter-spacing:.5px;color:var(--forest);padding:12px 0 6px;border-bottom:2px solid var(--sage)}

/* OVERVIEW TABLE */
.overview-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin:10px 0}
.ov-cell{background:var(--white);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--sand);font-size:.78em;cursor:pointer;transition:all .2s}
.ov-cell:hover{border-color:var(--coral);transform:translateY(-2px);box-shadow:var(--shadow)}
.ov-cell .ov-day{font-weight:700;color:var(--forest);font-size:.75em;text-transform:uppercase;margin-bottom:4px}
.ov-cell .ov-dinner{font-weight:600;color:var(--dark);margin-bottom:3px;font-size:.95em}
.ov-cell .ov-bfast{color:var(--mid);font-size:.9em}
.ov-cell .ov-cost{color:var(--coral);font-weight:700;margin-top:4px;font-size:.9em}
.ov-head{font-weight:700;font-size:.7em;text-transform:uppercase;letter-spacing:.5px;color:var(--mid);text-align:center;padding:4px}

/* PREP CHECKLIST */
.prep-block{margin:10px 0}
.prep-block h4{font-size:.9em;font-weight:700;color:var(--forest);margin-bottom:8px}
.prep-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--warm)}
.prep-item input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--forest);cursor:pointer}
.prep-item span{font-size:.85em;cursor:pointer}
.prep-item.checked span{text-decoration:line-through;opacity:.5}

/* COLLAPSIBLES */
.collapse-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0}
.collapse-trigger::after{content:'▾';font-size:.8em;color:var(--mid);transition:transform .2s}
.collapse-trigger.open::after{transform:rotate(180deg)}
.collapse-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse-body.open{max-height:5000px}

/* BUDGET */
.budget-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--warm);font-size:.88em}
.budget-row .bl{color:var(--mid)}.budget-row .br{font-weight:700;color:var(--dark)}
.budget-row.total{border-top:2px solid var(--forest);border-bottom:none;font-size:1em}
.budget-row.total .br{color:var(--forest)}

/* WORKOUT */
.exercise-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--warm);font-size:.88em}
.exercise-row .ename{font-weight:600}.exercise-row .esets{color:var(--mid);white-space:nowrap}

/* SEARCH */
.search-box{padding:10px 16px;background:var(--warm);border-bottom:1px solid var(--sand)}
.search-box input{width:100%;padding:10px 14px;border-radius:var(--radius);border:2px solid var(--sand);font-size:.9em;font-family:inherit;background:var(--white);outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--forest)}

/* PANTRY */
.pantry-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--warm);font-size:.85em}
.pantry-item .pi-name{color:var(--dark)}.pantry-item .pi-price{color:var(--coral);font-weight:600}

/* RESPONSIVE */
@media(max-width:600px){
  .header h1{font-size:1.3em}
  .header{padding:max(28px,env(safe-area-inset-top)) 20px 18px}
  .overview-grid{grid-template-columns:1fr 1fr;gap:6px}
  .ov-head{display:none}
  .ingredients{columns:1}
  .panel{padding:12px}
  .nav button{padding:12px 14px;font-size:.78em;min-height:48px}
  .week-bar button{width:44px;height:44px;font-size:.9em}
  .day-btn{padding:12px 16px;min-width:56px;min-height:48px}
  .shop-item{padding:12px 0;min-height:48px}
  .shop-item input[type=checkbox]{width:24px;height:24px}
  .prep-item{padding:12px 0;min-height:48px}
  .prep-item input[type=checkbox]{width:22px;height:22px}
  .collapse-trigger{min-height:44px;padding:8px 0}
  .sched-table td{padding:10px 6px}
}

/* UTILITY */
.section-title{font-family:Georgia,'Times New Roman',serif;font-size:1.3em;color:var(--dark);margin:18px 0 12px}
.divider{height:1px;background:var(--sand);margin:16px 0}
.badge{display:inline-block;font-size:.68em;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}
.badge-sc{background:#FFF3E0;color:#E65100}
.badge-oven{background:#E3F2FD;color:#1565C0}
.badge-stove{background:#F3E5F5;color:#7B1FA2}
.empty-state{text-align:center;padding:40px 20px;color:var(--mid);font-size:.95em}
.tab-icon{font-size:1.1em;display:block;margin-bottom:2px}
.progress-bar{height:6px;background:var(--sand);border-radius:3px;margin:12px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--forest);border-radius:3px;transition:width .4s}
</style>
</head>
<body>

<div class="header">

  <div class="sub">7-Week Planner · Family of 5 · $3–$5/Person · Walmart</div>
</div>

<div class="nav" id="mainNav">
  <button class="active" onclick="showTab('today')"><span class="tab-icon">📅</span>Today</button>
  <button onclick="showTab('overview')"><span class="tab-icon">🗓</span>Overview</button>
  <button onclick="showTab('shop')"><span class="tab-icon">🛒</span>Shopping</button>
  <button onclick="showTab('prep')"><span class="tab-icon">🥗</span>Prep</button>
  <button onclick="showTab('recipes')"><span class="tab-icon">📖</span>Recipes</button>
  <button onclick="showTab('pantry')"><span class="tab-icon">🏪</span>Pantry</button>
</div>

<div class="week-bar">
  <span class="week-label">WEEK</span>
  <button onclick="setWeek(1)" class="active" id="wb1">1</button>
  <button onclick="setWeek(2)" id="wb2">2</button>
  <button onclick="setWeek(3)" id="wb3">3</button>
  <button onclick="setWeek(4)" id="wb4">4</button>
  <button onclick="setWeek(5)" id="wb5">5</button>
  <button onclick="setWeek(6)" id="wb6">6</button>
  <button onclick="setWeek(7)" id="wb7">7</button>

<div id="panelToday" class="panel active"></div>
<div id="panelOverview" class="panel"></div>
<div id="panelShop" class="panel"></div>

let currentWeek = 0;
let currentDay = 0;
let currentTab = 'today';
let checkedItems = {};

// ═══ NAVIGATION ═══
function showTab(tab){
  currentTab=tab;
  Array.from(document.querySelectorAll('.nav button')).forEach((b,i)=>b.classList.toggle('active',['today','overview','shop','prep','recipes','pantry'][i]===tab));
  Array.from(document.querySelectorAll('.panel')).forEach(p=>p.classList.remove('active'));
  document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  render();
}
window.showTab=showTab;

function setWeek(w){
  currentWeek=w-1;currentDay=0;
  Array.from(document.querySelectorAll('.week-bar button')).forEach((b,i)=>b.classList.toggle('active',i===currentWeek));
  render();
}
window.setWeek=setWeek;

function setDay(d){currentDay=d;render();}
window.setDay=setDay;

// ═══ RENDER ═══
function render(){
  try{
  if(currentTab==='today') renderToday();
  else if(currentTab==='overview') renderOverview();
  else if(currentTab==='shop') renderShop();
  else if(currentTab==='prep') renderPrep();
  else if(currentTab==='recipes') renderRecipes();
  else if(currentTab==='pantry') renderPantry();
  }catch(e){
    var p=document.getElementById('panelToday');
    p.innerHTML='<div class="card" style="color:red;padding:20px"><h3>Error</h3><pre style="white-space:pre-wrap;font-size:12px">'+e.message+'\n\n'+e.stack+'</pre></div>';
    p.style.display='block';
  }
}

function renderToday(){
  const w=DATA.weeks[currentWeek];
  const m=w.meals[currentDay];
  const dayName=DATA.days[currentDay];
  const wo=DATA.workouts[dayName];
  let h='';

  // Day strip
  h+='<div class="day-strip">';
  DATA.days.forEach((d,i)=>{
    const cls=i===currentDay?'active':'';
    const sun=i===0?'sunday':'';
    h+=`<div class="day-btn ${cls} ${sun}" onclick="setDay(${i})"><div class="dow">${d.slice(0,3)}</div><div class="dname">${w.meals[i].dinner.split('+')[0].split(' ').slice(0,3).join(' ')}</div></div>`;
  });
  h+='</div>';

  // Today header
  h+=`<div style="text-align:center;margin:8px 0 14px"><span style="font-family:Georgia,'Times New Roman',serif;font-size:1.4em">${dayName}</span><br><span style="color:var(--mid);font-size:.85em">Week ${currentWeek+1}: ${DATA.weekNames[currentWeek]}</span></div>`;

  // Quick glance
  h+=`<div class="card" style="background:linear-gradient(135deg,var(--light-sage),var(--white))">`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  h+=`<div><span class="card-label label-breakfast">Breakfast</span><div style="font-weight:600;font-size:.92em">${m.breakfast}</div></div>`;
  h+=`<div><span class="card-label label-dinner">Dinner</span><div style="font-weight:600;font-size:.92em">${m.dinner}</div></div>`;
  h+=`</div>`;
  h+=`<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">`;
  h+=`<span class="meta-tag">${wo.icon} ${wo.name}</span>`;
  h+=`<span class="meta-tag">💰 $${m.cost}/person</span>`;
  h+=`<span class="meta-tag">⏱ ${m.time}</span>`;
  h+=`<span class="meta-tag">🍳 ${m.method}</span>`;
  h+=`</div></div>`;

  // Schedule
  h+=`<div class="card"><span class="card-label label-schedule">Daily Schedule</span>`;
  h+=`<div class="collapse-trigger open" onclick="toggleCollapse(this)"><h3>⏰ ${dayName}'s Schedule</h3></div>`;
  h+=`<div class="collapse-body open"><table class="sched-table">`;
  let sched;
  if(dayName==='Sunday') sched=DATA.scheduleTemplate.Sunday;
  else if(dayName==='Friday') sched=DATA.scheduleTemplate.Friday;
  else if(dayName==='Saturday') sched=DATA.scheduleTemplate.Saturday;
  else sched=DATA.scheduleTemplate.Weekday;
  sched.forEach(([time,event,detail])=>{
    let ev=event.replace('[BREAKFAST]',m.breakfast).replace('[DINNER]',m.dinner).replace('[WORKOUT]',`${wo.icon} ${wo.name}`);
    let det=detail.replace('[BREAKFAST]',m.breakfast).replace('[DINNER]',m.dinner).replace('[DINNER_START]',`${m.dinner} — ${m.method}, ~${m.time}`).replace('[SNACK]',m.snack||'').replace('[PM_SNACK]',m.pmSnack||'');
    const hl=(ev.includes('dinner')||ev.includes('🍽️'))?'sched-highlight':'';
    h+=`<tr class="${hl}"><td class="time">${time}</td><td><div class="event">${ev}</div><div class="details">${det}</div></td></tr>`;
  });
  h+=`</table></div></div>`;

  // Breakfast recipe
  h+=renderRecipeCard(m,'breakfast');
  // Workout
  h+=renderWorkoutCard(wo,dayName);
  // Dinner recipe
  h+=renderRecipeCard(m,'dinner');

  document.getElementById('panelToday').innerHTML=h;
}

function renderRecipeCard(m, type){
  const isB = type==='breakfast';
  const label = isB ? 'Breakfast' : 'Dinner';
  const cls = isB ? 'label-breakfast' : 'label-dinner';
  const name = isB ? m.breakfast : m.dinner;
  const ingr = isB ? m.bIngr : m.dIngr;
  const steps = isB ? m.bSteps : m.dSteps;
  const tip = isB ? m.bTip : m.dTip;
  const plate = isB ? '' : m.plate;

  let h=`<div class="card"><span class="card-label ${cls}">${label} Recipe</span>`;
  h+=`<div class="collapse-trigger" onclick="toggleCollapse(this)"><h3>${isB?'🥞':'🍽️'} ${name}</h3></div>`;
  h+=`<div class="collapse-body">`;
  if(!isB){
    h+=`<div class="meta-row"><span class="meta-tag">${m.cuisine}</span><span class="meta-tag">${m.method}</span><span class="meta-tag">⏱ ${m.time}</span><span class="meta-tag">💰 $${m.cost}/person</span><span class="meta-tag">Serves 5</span></div>`;
  }
  h+=`<h4 style="font-size:.85em;font-weight:700;color:var(--forest);margin:8px 0 4px">INGREDIENTS</h4><ul class="ingredients">`;
  ingr.forEach(i=>h+=`<li>${i}</li>`);
  h+=`</ul><h4 style="font-size:.85em;font-weight:700;color:var(--forest);margin:8px 0 4px">INSTRUCTIONS</h4><ol class="steps">`;
  steps.forEach(s=>h+=`<li>${s}</li>`);
  h+=`</ol>`;
  if(tip) h+=`<div class="tip">💡 ${tip}</div>`;
  if(plate) h+=`<div class="weight-plate">⚖️ <strong>Your Weight Loss Plate:</strong> ${plate}</div>`;
  h+=`</div></div>`;
  return h;
}

function renderWorkoutCard(wo,dayName){
  const colors={rest:'#F3E5F5',strength:'#E3F2FD',cardio:'#E8F5E9',family:'#FFF8E1'};
  let h=`<div class="card" style="border-left:4px solid ${wo.type==='strength'?'#1565C0':wo.type==='cardio'?'#2E7D32':wo.type==='family'?'#F57F17':'#7B1FA2'}">`;
  h+=`<span class="card-label label-workout">${wo.icon} Workout</span>`;
  h+=`<div class="collapse-trigger" onclick="toggleCollapse(this)"><h3>${wo.icon} ${wo.name}</h3></div>`;
  h+=`<div class="collapse-body">`;
  if(wo.time) h+=`<div class="meta-row"><span class="meta-tag">⏱ ${wo.time}</span><span class="meta-tag">${wo.type==='strength'?'35–40 min':wo.type==='cardio'?'45 min':'60+ min'}</span></div>`;
  wo.exercises.forEach(e=>{
    h+=`<div class="exercise-row"><span class="ename">${e.n}</span><span class="esets">${e.s}</span></div>`;
  });
  const tips={Sunday:"Sunday is full meal prep day. The activity IS the cooking. Rest your muscles.",Monday:"Rest 60 sec between sets. Focus on form over speed.",Tuesday:"Great day to push the stroller or walk with a friend.",Wednesday:"Strength B focuses on back, hamstrings, and triceps.",Thursday:"Thursday cardio is the one to do with your family.",Friday:"Same as Monday. Track if you can do more reps — that's progress.",Saturday:"This doesn't feel like a workout but it absolutely counts. 60+ min of family movement."};
  h+=`<div class="tip">💡 ${tips[dayName]}</div>`;
  h+=`</div></div>`;
  return h;
}

  const b=DATA.weekBudgets[currentWeek];
  let h=`<div class="section-title">Week ${currentWeek+1}: ${DATA.weekNames[currentWeek]}</div>`;

  // Budget summary
  h+=`<div class="card"><h3>💰 Week ${currentWeek+1} Budget</h3>`;
  h+=`<div class="budget-row"><span class="bl">Fresh groceries</span><span class="br">$${b.fresh.toFixed(2)}</span></div>`;
  h+=`<div class="budget-row"><span class="bl">All 7 dinners (family of 5)</span><span class="br">$${b.dinners.toFixed(2)}</span></div>`;
  h+=`<div class="budget-row"><span class="bl">Average dinner cost/person</span><span class="br">$${b.avg}/meal</span></div>`;
  if(currentWeek===0) h+=`<div class="budget-row"><span class="bl">One-time pantry (all 7 weeks)</span><span class="br">$159.34</span></div>`;
  h+=`<div class="budget-row total"><span class="bl">Total Week ${currentWeek+1} Spend</span><span class="br">$${(currentWeek===0?b.fresh+159.34:b.fresh).toFixed(2)}</span></div>`;
  h+=`</div>`;

  // Overview grid
  h+=`<div class="card"><h3>🗓 Meal Overview</h3>`;
  h+=`<div class="overview-grid">`;
  DATA.days.forEach(d=>h+=`<div class="ov-head">${d.slice(0,3)}</div>`);
  w.meals.forEach((m,i)=>{
    h+=`<div class="ov-cell" onclick="currentTab='today';showTab('today');setDay(${i})">`;
    h+=`<div class="ov-day">${DATA.days[i].slice(0,3)}</div>`;
    h+=`<div class="ov-dinner">${m.dinner.split('+')[0].trim()}</div>`;
    h+=`<div class="ov-bfast">🥞 ${m.breakfast.split(' ').slice(0,3).join(' ')}</div>`;
    h+=`<div class="ov-cost">$${m.cost}</div>`;
    h+=`</div>`;
  });
  h+=`</div></div>`;

  // Full week schedule quick reference
  h+=`<div class="card"><h3>📋 Quick Reference</h3>`;
  h+=`<table class="sched-table">`;
  w.meals.forEach((m,i)=>{
    const wo=DATA.workouts[DATA.days[i]];
    h+=`<tr style="cursor:pointer" onclick="currentTab='today';showTab('today');setDay(${i})"><td class="time" style="width:80px">${DATA.days[i].slice(0,3)}</td><td><div class="event">${m.dinner}</div><div class="details">🥞 ${m.breakfast} · ${wo.icon} ${wo.name} · 💰 $${m.cost}</div></td></tr>`;
  });
  h+=`</table></div>`;

  document.getElementById('panelOverview').innerHTML=h;
}

function renderShop(){
  const w=DATA.weeks[currentWeek];
  const key=`shop_w${currentWeek}`;
  let h=`<div class="section-title">🛒 Week ${currentWeek+1} Shopping List</div>`;

  // Progress
  const checked=w.shopping.filter((_,i)=>checkedItems[key+'_'+i]).length;
  const pct=Math.round(checked/w.shopping.length*100);
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;font-size:.85em;font-weight:600"><span>${checked} of ${w.shopping.length} items</span><span>${pct}% done</span></div>`;
  h+=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  h+=`<div style="text-align:right;font-size:.78em;color:var(--mid)">Tap items as you put them in the cart</div></div>`;

  h+=`<div class="card">`;
  w.shopping.forEach((item,i)=>{
    const ck=checkedItems[key+'_'+i]?'checked':'';
    h+=`<div class="shop-item ${ck}"><label><input type="checkbox" ${ck} onchange="toggleShopItem('${key}_${i}',this)"><span>${item.item}</span></label><span class="qty">${item.qty}</span><span class="price">$${item.price.toFixed(2)}</span></div>`;
  });
  const total=w.shopping.reduce((s,i)=>s+i.price,0);
  h+=`<div class="shop-total">Total: $${total.toFixed(2)}</div>`;
  h+=`</div>`;

  h+=`<div style="text-align:center;padding:10px"><button onclick="clearShopChecks('${key}')" style="padding:10px 20px;border-radius:var(--radius);border:2px solid var(--sand);background:var(--white);cursor:pointer;font-family:inherit;font-weight:600;color:var(--mid)">Reset Checklist</button></div>`;

  document.getElementById('panelShop').innerHTML=h;
}

function toggleShopItem(key,el){
  if(el.checked) checkedItems[key]=true; else delete checkedItems[key];
  saveChecks();render();
}
function clearShopChecks(prefix){
  Object.keys(checkedItems).filter(k=>k.startsWith(prefix)).forEach(k=>delete checkedItems[k]);
  saveChecks();render();
}

function renderPrep(){
  const w=DATA.weeks[currentWeek];
  const key=`prep_w${currentWeek}`;
  let h=`<div class="section-title">🥗 Sunday Prep — Week ${currentWeek+1}</div>`;

  h+=`<div class="card" style="background:linear-gradient(135deg,#FFF8E1,var(--white))"><p style="font-size:.88em;color:var(--mid)">Everything you prep on Sunday so the week runs smoothly. Split into two blocks: before church (9–11am) and after church (2:30pm+).</p></div>`;

  // Block 1
  h+=`<div class="card"><h3>🌅 Block 1 — Before Church (9:00–11:00am)</h3><div class="prep-block">`;
  w.prep.block1.forEach((item,i)=>{
    const ck=checkedItems[key+'_b1_'+i]?'checked':'';
    h+=`<div class="prep-item ${ck}"><input type="checkbox" ${ck} onchange="togglePrepItem('${key}_b1_${i}',this)"><span onclick="this.previousElementSibling.click()">${item}</span></div>`;
  });
  h+=`</div></div>`;

  // Block 2
  h+=`<div class="card"><h3>🌆 Block 2 — After Church (2:30pm+)</h3><div class="prep-block">`;
  w.prep.block2.forEach((item,i)=>{
    const ck=checkedItems[key+'_b2_'+i]?'checked':'';
    h+=`<div class="prep-item ${ck}"><input type="checkbox" ${ck} onchange="togglePrepItem('${key}_b2_${i}',this)"><span onclick="this.previousElementSibling.click()">${item}</span></div>`;
  });
  h+=`</div></div>`;

  // What you'll have ready
  h+=`<div class="card" style="border-left:4px solid var(--forest)"><h3>✅ After Sunday Prep You'll Have Ready</h3>`;
  h+=`<ul style="font-size:.88em;color:var(--mid);list-style:none;padding:0">`;
  h+=`<li style="padding:4px 0">🍚 Cooked rice batch — ready for fried rice, bowls, sides all week</li>`;
  h+=`<li style="padding:4px 0">🥚 Hard boiled eggs — grab-and-go snacks and breakfast additions</li>`;
  h+=`<li style="padding:4px 0">🫙 Overnight oats jars — grab from fridge, 0 prep mornings</li>`;
  h+=`<li style="padding:4px 0">🥤 Smoothie freezer bags — dump in blender, 45 sec, done</li>`;
  h+=`<li style="padding:4px 0">🧁 Egg muffins — 40-second microwave, out the door</li>`;
  h+=`<li style="padding:4px 0">🥕 Snack veggies chopped — ready in containers</li>`;
  h+=`</ul></div>`;

  h+=`<div style="text-align:center;padding:10px"><button onclick="clearPrepChecks('${key}')" style="padding:10px 20px;border-radius:var(--radius);border:2px solid var(--sand);background:var(--white);cursor:pointer;font-family:inherit;font-weight:600;color:var(--mid)">Reset Prep Checklist</button></div>`;

  document.getElementById('panelPrep').innerHTML=h;
}

function togglePrepItem(key,el){
  if(el.checked) checkedItems[key]=true; else delete checkedItems[key];
  saveChecks();render();
}
function clearPrepChecks(prefix){
  Object.keys(checkedItems).filter(k=>k.startsWith(prefix)).forEach(k=>delete checkedItems[k]);
  saveChecks();render();
}

function renderRecipes(){
  const w=DATA.weeks[currentWeek];
  let h=`<div class="section-title">📖 Week ${currentWeek+1} Recipes</div>`;

  // Search
  h+=`<div style="margin-bottom:14px"><input type="text" id="recipeSearch" placeholder="Search recipes..." oninput="filterRecipes()" style="width:100%;padding:10px 14px;border-radius:var(--radius);border:2px solid var(--sand);font-size:.9em;font-family:inherit;background:var(--white)"></div>`;

  w.meals.forEach((m,i)=>{
    h+=`<div class="recipe-card-wrap" data-search="${(m.dinner+' '+m.breakfast+' '+m.cuisine).toLowerCase()}">`;
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:start"><div><span class="card-label label-dinner">${DATA.days[i]} Dinner</span><h3>${m.dinner}</h3></div><div style="text-align:right"><span class="meta-tag">${m.cuisine}</span><br><span style="font-weight:700;color:var(--coral);font-size:.9em">$${m.cost}</span></div></div>`;
    h+=`<div class="meta-row"><span class="meta-tag">${m.method}</span><span class="meta-tag">⏱ ${m.time}</span><span class="meta-tag">Serves 5</span></div>`;

    h+=`<h4 style="font-size:.85em;font-weight:700;color:var(--forest);margin:10px 0 4px">INGREDIENTS</h4><ul class="ingredients">`;
    m.dIngr.forEach(ing=>h+=`<li>${ing}</li>`);
    h+=`</ul><h4 style="font-size:.85em;font-weight:700;color:var(--forest);margin:8px 0 4px">INSTRUCTIONS</h4><ol class="steps">`;
    m.dSteps.forEach(s=>h+=`<li>${s}</li>`);
    h+=`</ol>`;
    if(m.dTip) h+=`<div class="tip">💡 ${m.dTip}</div>`;
    if(m.plate) h+=`<div class="weight-plate">⚖️ <strong>Your Plate:</strong> ${m.plate}</div>`;
    h+=`</div></div>`;
  });

  document.getElementById('panelRecipes').innerHTML=h;
}

function filterRecipes(){
  const q=document.getElementById('recipeSearch').value.toLowerCase();
  Array.from(document.querySelectorAll('.recipe-card-wrap')).forEach(el=>{
    el.style.display=el.dataset.search.includes(q)?'block':'none';
  });
}

function renderPantry(){
  let h=`<div class="section-title">🏪 One-Time Pantry List</div>`;
  h+=`<div class="card"><p style="font-size:.88em;color:var(--mid);margin-bottom:12px">Buy these on the Saturday before Week 1. They cover all 7 weeks.</p>`;
  DATA.pantry.forEach(p=>{
    h+=`<div class="pantry-item"><span class="pi-name">${p.item}</span><span class="pi-price">$${p.price.toFixed(2)}</span></div>`;
  });
  const total=DATA.pantry.reduce((s,p)=>s+p.price,0);
  h+=`<div class="shop-total">Pantry Total: $${total.toFixed(2)}</div>`;
  h+=`</div>`;

  // 7-week totals
  h+=`<div class="card"><h3>💰 7-Week Budget Summary</h3>`;
  let grandTotal=159.34;
  DATA.weekBudgets.forEach((b,i)=>{
    h+=`<div class="budget-row"><span class="bl">Week ${i+1}: ${DATA.weekNames[i]}</span><span class="br">$${b.fresh.toFixed(2)}</span></div>`;
    grandTotal+=b.fresh;
  });
  h+=`<div class="budget-row"><span class="bl">One-time pantry</span><span class="br">$159.34</span></div>`;
  h+=`<div class="budget-row total"><span class="bl">7-Week Grand Total</span><span class="br">$${grandTotal.toFixed(2)}</span></div>`;
  h+=`<div style="font-size:.82em;color:var(--mid);margin-top:8px;text-align:center">That's $${(grandTotal/49).toFixed(2)} per dinner · $${(grandTotal/7).toFixed(2)} per week average</div>`;
  h+=`</div>`;

  document.getElementById('panelPantry').innerHTML=h;
}

// ═══ UTILS ═══
function toggleCollapse(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
window.toggleCollapse=toggleCollapse;
window.toggleShopItem=toggleShopItem;
window.clearShopChecks=clearShopChecks;
window.togglePrepItem=togglePrepItem;
window.clearPrepChecks=clearPrepChecks;
window.filterRecipes=filterRecipes;

// Initial render with safety
try { render(); } catch(e) {
  document.getElementById('panelToday').innerHTML='<div class="card" style="color:red"><h3>Error loading</h3><p>'+e.message+'</p><p>Line: '+(e.stack||'')+'</p></div>';
  document.getElementById('panelToday').classList.add('active');
}

}); // end DOMContentLoaded
</script>
</body>
</html>
