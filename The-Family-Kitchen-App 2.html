<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D5016">
<title>The Family Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#FAF6F0;--card:#FFFFFF;--card2:#F5F0E8;--green:#2D5016;--green2:#4A7C2E;--green3:#6B9B4A;--green-light:#E8F0E0;--green-pale:#F2F7ED;--brown:#5C3D2E;--brown2:#8B6914;--warm:#D4A574;--warm2:#E8C9A0;--warm-light:#FDF4E8;--coral:#D4654A;--coral-light:#FDE8E4;--text:#2C2016;--text2:#6B5D4F;--text3:#9B8E80;--border:rgba(92,61,46,0.08);--shadow:0 1px 3px rgba(44,32,22,0.06),0 4px 12px rgba(44,32,22,0.04);--r:20px;--rs:12px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--nav-h:68px}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;min-height:100dvh;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);overflow-x:hidden}
.hdr{background:linear-gradient(145deg,#2D5016 0%,#3D6B20 60%,#4A7C2E 100%);color:#fff;padding:calc(var(--safe-top) + 14px) 20px 16px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%);border-radius:50%}
.hdr h1{font-family:'Playfair Display',Georgia,serif;font-size:1.5em;font-weight:700;letter-spacing:.3px;position:relative;z-index:1}
.hdr .sub{font-size:.72em;opacity:.7;margin-top:3px;position:relative;z-index:1}
.wk-bar{display:flex;align-items:center;gap:6px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.wk-bar .wl{font-weight:700;font-size:.7em;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-right:4px}
.wk-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--bg);font-weight:700;font-size:.8em;cursor:pointer;color:var(--text2);transition:all .2s}
.wk-btn.on{background:var(--green);color:#fff;border-color:var(--green);transform:scale(1.1);box-shadow:0 2px 8px rgba(45,80,22,0.3)}
.wk-theme{flex:1;text-align:right;font-family:'Playfair Display',serif;font-size:.85em;color:var(--green2);font-weight:700}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-bottom));z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.04)}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:.6em;font-weight:600;font-family:inherit;transition:color .15s;letter-spacing:.3px}
.bnav button .ni{font-size:1.8em;line-height:1.2;transition:transform .15s}
.bnav button.on{color:var(--green)}
.bnav button.on .ni{transform:scale(1.15)}
.pnl{display:none;padding:12px 16px 20px;max-width:480px;margin:0 auto;animation:fadeUp .3s ease}
.pnl.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hero{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);border-radius:var(--r);padding:20px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;bottom:-30px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,0.05);border-radius:50%}
.hero .hero-label{font-size:.65em;text-transform:uppercase;letter-spacing:1.5px;opacity:.7;font-weight:600}
.hero .hero-meal{font-family:'Playfair Display',serif;font-size:1.4em;margin-top:6px;font-weight:700;line-height:1.3}
.hero .hero-sub{font-size:.8em;opacity:.8;margin-top:6px}
.hero .hero-cost{position:absolute;top:18px;right:18px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);padding:4px 12px;border-radius:20px;font-size:.75em;font-weight:700}
.days{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding:2px}
.days::-webkit-scrollbar{display:none}
.dbtn{flex:none;width:48px;text-align:center;padding:8px 0;border-radius:var(--rs);border:2px solid transparent;background:var(--card);cursor:pointer;transition:all .2s}
.dbtn .dd{font-size:.55em;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.5px}
.dbtn .dn{font-size:.95em;font-weight:700;color:var(--text);margin-top:1px}
.dbtn.on{background:var(--green);border-color:var(--green);box-shadow:0 2px 8px rgba(45,80,22,0.25)}
.dbtn.on .dd,.dbtn.on .dn{color:#fff}
.dbtn.sun{border-color:var(--green-light)}
.cd{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.cd h3{font-family:'Playfair Display',serif;font-size:1.05em;color:var(--text);margin-bottom:8px;line-height:1.3}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.6em;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:4px 10px;border-radius:20px}
.badge-bf{background:var(--warm-light);color:var(--brown2)}
.badge-din{background:var(--green-pale);color:var(--green)}
.badge-sc{background:var(--coral-light);color:var(--coral)}
.badge-sched{background:#E3F2FD;color:#1565C0}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.pill{font-size:.68em;padding:4px 10px;border-radius:20px;background:var(--card2);color:var(--text2);font-weight:600}
.pill-protein{background:var(--green-pale);color:var(--green)}
.srow{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.srow:last-child{border-bottom:none}
.srow .st{font-weight:700;color:var(--green);min-width:50px;font-size:.75em;padding-top:1px}
.srow .se{flex:1}
.srow .se strong{font-size:.82em;display:block;color:var(--text)}
.srow .se span{font-size:.72em;color:var(--text3);display:block;margin-top:1px}
.srow.alert{background:var(--coral-light);border-radius:var(--rs);padding:10px;margin:2px -10px;border-bottom:none}
.srow.hl{background:var(--green-pale);border-radius:var(--rs);padding:10px;margin:2px -10px;border-bottom:none}
.r-quick{background:var(--warm-light);border-radius:var(--rs);padding:10px 14px;font-size:.85em;font-weight:600;color:var(--brown);margin:8px 0;border-left:4px solid var(--warm)}
.ing{columns:2;column-gap:14px;list-style:none;margin:8px 0;font-size:.82em}
.ing li{padding:3px 0 3px 16px;break-inside:avoid;position:relative;color:var(--text2)}
.ing li::before{content:'•';position:absolute;left:2px;color:var(--green3);font-weight:800}
.stp{counter-reset:s;list-style:none;margin:8px 0}
.stp li{font-size:.82em;padding:8px 0 8px 36px;position:relative;border-bottom:1px solid var(--border);color:var(--text2)}
.stp li:last-child{border-bottom:none}
.stp li::before{counter-increment:s;content:counter(s);position:absolute;left:0;width:26px;height:26px;background:var(--green);color:#fff;border-radius:50%;text-align:center;line-height:26px;font-size:.72em;font-weight:700}
.tip{background:var(--warm-light);border-left:4px solid var(--warm);padding:10px 14px;border-radius:0 var(--rs) var(--rs) 0;font-size:.8em;margin:10px 0;color:var(--brown)}
.plate{background:var(--green-pale);border-left:4px solid var(--green3);padding:10px 14px;border-radius:0 var(--rs) var(--rs) 0;font-size:.8em;margin:10px 0;color:var(--green)}
.acc{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:4px 0;user-select:none}
.acc::after{content:'';width:8px;height:8px;border-right:2px solid var(--text3);border-bottom:2px solid var(--text3);transform:rotate(45deg);transition:transform .2s;flex-shrink:0}
.acc.open::after{transform:rotate(-135deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.acc-body.open{max-height:9000px}
.shop-prog{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:10px 0}
.shop-fill{height:100%;background:linear-gradient(90deg,var(--green3),var(--green));border-radius:4px;transition:width .4s ease}
.shop-count{font-size:.75em;color:var(--text3);text-align:right;margin-bottom:8px}
.si{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.si input{width:22px;height:22px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.si .sn{flex:1;font-size:.85em;transition:opacity .2s}
.si.done .sn{opacity:.35;text-decoration:line-through}
.shop-cat{font-weight:700;font-size:.7em;text-transform:uppercase;letter-spacing:1px;color:var(--green);padding:14px 0 6px}
.prep-i{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.prep-i input{margin-top:2px;width:22px;height:22px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.prep-i label{font-size:.85em;cursor:pointer;flex:1;transition:opacity .2s}
.prep-i.done label{opacity:.35;text-decoration:line-through}
.prep-prog{display:flex;align-items:center;gap:8px;font-size:.75em;color:var(--text3);margin-bottom:6px}
.prep-prog .pp-bar{flex:1;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.prep-prog .pp-fill{height:100%;background:var(--green3);border-radius:3px;transition:width .3s}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.ov-card{background:var(--card);border-radius:var(--rs);padding:12px;border:2px solid var(--border);cursor:pointer;transition:all .15s}
.ov-card:active{transform:scale(0.97)}
.ov-card .ov-day{font-weight:700;color:var(--green);font-size:.65em;text-transform:uppercase;letter-spacing:.8px}
.ov-card .ov-din{font-family:'Playfair Display',serif;font-size:.85em;color:var(--text);margin:4px 0 2px;line-height:1.3}
.ov-card .ov-bf{font-size:.72em;color:var(--text3)}
.ov-card .ov-cost{font-size:.72em;color:var(--coral);font-weight:700;margin-top:4px}
.ov-card.sun{border-color:var(--green-light);background:var(--green-pale)}
.ov-card.fri{border-color:#FFF3E0;background:var(--warm-light)}
.ov-card.sat{border-color:var(--green-light);background:#F2F7ED}
.brow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85em}
.brow .bl{color:var(--text2)}.brow .br{font-weight:700;color:var(--text)}
.brow.tot{border-top:2px solid var(--green);border-bottom:none;padding-top:14px;font-size:.95em}
.brow.tot .br{color:var(--green)}
.cook-mode{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;overflow-y:auto}
.cook-mode.on{display:flex}
.cook-top{background:var(--green);color:#fff;padding:calc(var(--safe-top) + 12px) 16px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:1}
.cook-top .cook-close{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cook-top h2{font-family:'Playfair Display',serif;font-size:1.1em;flex:1}
.cook-body{flex:1;padding:16px;overflow-y:auto}
.cook-step{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.cook-step .cs-num{width:36px;height:36px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9em;margin-bottom:10px}
.cook-step p{font-size:.95em;line-height:1.6;color:var(--text)}
.cook-timer{display:flex;align-items:center;gap:10px;margin-top:14px;padding:12px;background:var(--warm-light);border-radius:var(--rs);flex-wrap:wrap}
.cook-timer .ct-display{font-family:'DM Sans',monospace;font-size:1.8em;font-weight:700;color:var(--brown);min-width:80px}
.cook-timer button{padding:8px 16px;border-radius:20px;border:none;font-weight:700;font-size:.8em;cursor:pointer;font-family:inherit}
.ct-start{background:var(--green);color:#fff}
.ct-reset{background:var(--card2);color:var(--text2)}
.cook-btn{display:block;width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--green);color:#fff;font-size:.9em;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:transform .1s}
.cook-btn:active{transform:scale(0.97)}
.sec{font-family:'Playfair Display',serif;font-size:1.15em;color:var(--text);margin:16px 0 10px}
@media(min-width:500px){.ov-grid{grid-template-columns:repeat(3,1fr)}.days{justify-content:center}}
</style>
</head>
<body>

<div class="pnl" id="p-week"></div>
<div class="pnl" id="p-shop"></div>
<div class="pnl" id="p-prep"></div>
<div class="pnl" id="p-recipes"></div>
<div class="bnav" id="bnav"></div>

<script>
const WT=["Classic Family Favorites","Global Mix","Budget Stretchers","Comfort & Hearty","Fan Favorites Remix","Southern & Slow","Around the World"];

const BF={S1:{n:"PB Banana Protein Shake",i:"🥤",t:"Smoothie",q:"Dump freezer bag + milk + protein powder. Blend 45 sec.",pr:"30g",c:"$0.90",tm:"2 min",ing:["1 frozen banana","1 tbsp peanut butter","1 scoop protein powder","1 cup milk","1 cup spinach","1 tbsp honey"],st:["Dump freezer bag into blender.","Add milk and protein powder.","Blend 45 seconds. Pour and go."],tip:"Kids love half-portions. PB keeps everyone full until lunch.",pl:"30g protein, under 350 cal."},S2:{n:"Berry Blast Protein Smoothie",i:"🥤",t:"Smoothie",q:"Berry bag + yogurt + protein powder. Blend 1 min.",pr:"28g",c:"$1.10",tm:"2 min",ing:["1 cup frozen berries","½ banana","½ cup Greek yogurt","1 scoop protein powder","¾ cup milk"],st:["Dump berry bag into blender.","Add yogurt, protein powder, milk.","Blend 60 seconds."],tip:"Greek yogurt makes it thick. Kids think it's a milkshake.",pl:"28g protein. Add egg for 35g."},S3:{n:"Tropical Green Smoothie",i:"🥤",t:"Smoothie",q:"Blend freezer bag + milk + protein powder. 45 sec.",pr:"27g",c:"$1.00",tm:"2 min",ing:["½ cup frozen mango","½ cup pineapple","2 cups spinach","1 scoop protein powder","1 cup milk"],st:["Dump tropical bag into blender.","Add milk and protein powder.","Blend 45–60 seconds."],tip:"Pineapple hides the spinach completely!",pl:"27g protein. Add cheese stick for 33g."},O1:{n:"PB Banana Power Oats",i:"🫙",t:"Oats",q:"Grab jar from fridge. Eat cold or microwave 60 sec.",pr:"22g",c:"$0.75",tm:"30 sec",ing:["½ cup oats","½ cup milk","¼ cup Greek yogurt","1 tbsp PB","1 tbsp chia seeds","½ banana","Honey, cinnamon"],st:["Sunday: jar + oats + milk + yogurt + chia + PB + honey.","Top with banana. Seal.","Morning: grab and eat."],tip:"Make 4 jars Sunday — 4 mornings handled.",pl:"22g protein. Under 380 cal."},O2:{n:"Berry Cheesecake Oats",i:"🫙",t:"Oats",q:"Grab jar. Stir and eat.",pr:"25g",c:"$0.85",tm:"30 sec",ing:["½ cup oats","¼ cup Greek yogurt","2 tbsp cream cheese","½ scoop protein powder","½ cup berries","Honey, granola"],st:["Sunday: mix oats, yogurt, cream cheese, protein powder, milk.","Top with berries + granola. Seal.","Morning: grab, stir, eat."],tip:"Tastes like dessert. Kids ask for it by name.",pl:"25g protein."},O3:{n:"Apple Cinnamon Crunch Oats",i:"🫙",t:"Oats",q:"Grab jar, add crunch topping, eat.",pr:"20g",c:"$0.70",tm:"30 sec",ing:["½ cup oats","¼ cup yogurt","½ apple diced","1 tbsp almond butter","Cinnamon","Granola + almonds"],st:["Sunday: oats + yogurt + almond butter + cinnamon.","Add apple. Seal.","Morning: add granola + almonds."],tip:"Tastes like apple pie!",pl:"20g protein. Full past lunch."},M1:{n:"Bacon Cheddar Egg Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3 from fridge, microwave 40–50 sec.",pr:"12g/ea",c:"$0.40",tm:"1 min",ing:["8 eggs","¼ cup milk","6 strips bacon crumbled","1 cup cheddar","Garlic powder"],st:["Cook + crumble bacon.","Whisk eggs + milk + seasonings. Add bacon + cheese.","Spray muffin tin. Fill ¾. Bake 350°F 18–20 min."],tip:"Make 24 — everyone's favorite!",pl:"2 muffins = 24g protein."},M2:{n:"Southwest Black Bean Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3, microwave 40–50 sec.",pr:"11g/ea",c:"$0.35",tm:"1 min",ing:["8 eggs","¼ cup milk","½ cup black beans","½ cup bell pepper","1 cup Mexican cheese","Cumin"],st:["Whisk eggs + milk + cumin.","Add beans + pepper to cups. Pour eggs.","Top cheese. Bake 350°F 18–20 min."],tip:"Most filling muffin — beans add fiber.",pl:"2 muffins = 22g protein."},M3:{n:"Ham & Swiss Egg Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3, microwave 40–50 sec.",pr:"13g/ea",c:"$0.45",tm:"1 min",ing:["8 eggs","¼ cup milk","1 cup diced ham","1 cup Swiss cheese","Dijon mustard"],st:["Whisk eggs + milk + mustard.","Add ham. Pour eggs. Top Swiss.","Bake 350°F 18–20 min."],tip:"Tastes like a deli sandwich!",pl:"2 muffins = 26g protein."},M4:{n:"Veggie Garden Egg Muffins",i:"🧁",t:"Muffin",q:"Grab 2–3, microwave 40–50 sec.",pr:"10g/ea",c:"$0.35",tm:"1 min",ing:["8 eggs","¼ cup milk","Zucchini, bell pepper, mushrooms","1 cup mozzarella","Italian seasoning"],st:["Sauté veggies 3–4 min.","Whisk eggs + seasoning. Add veggies + cheese.","Bake 350°F 18–20 min."],tip:"Sneaky veggies! Melty mozz on top.",pl:"2 muffins = 20g protein."},H1:{n:"Dad's Scrambled Eggs + Toast",i:"🍳",t:"Hot Plate",q:"Scramble eggs with cheese, serve with toast.",pr:"24g",c:"$0.80",tm:"5 min",ing:["2 eggs/person","Cheddar","Whole wheat toast","Butter"],st:["Crack eggs + milk + salt + pepper.","Scramble 2–3 min. Add cheese.","Toast bread. Serve together."],tip:"Dad's specialty! Best for weekends & Fridays.",pl:"24g protein. Classic."},H2:{n:"Protein Pancakes + Turkey Sausage",i:"🥞",t:"Hot Plate",q:"Mix batter + protein powder. Cook griddle. Heat sausage.",pr:"32g",c:"$1.20",tm:"10 min",ing:["1 cup pancake mix","1 scoop protein powder","1 egg, ¾ cup milk","Turkey sausage links","Syrup"],st:["Mix batter + protein powder + egg + milk.","Cook 2 min/side. Heat sausage.","Stack + light syrup."],tip:"Protein powder fills everyone up!",pl:"32g protein. Limit syrup."},H3:{n:"Breakfast Burritos",i:"🌯",t:"Hot Plate",q:"Eggs + beans + cheese in tortilla. Or microwave frozen.",pr:"22g",c:"$0.85",tm:"5 min",ing:["2 eggs","Black beans","Mexican cheese","Flour tortilla","Salsa"],st:["Scramble eggs 2 min.","Warm beans + tortilla.","Layer, fold, wrap. Add salsa."],tip:"Freeze 10 Sunday — 2-min hot breakfast!",pl:"22g protein."},G1:{n:"Yogurt Parfait + Granola",i:"🥣",t:"Grab & Go",q:"Scoop yogurt, top granola + banana. 60 sec.",pr:"18g",c:"$0.90",tm:"1 min",ing:["1 cup Greek yogurt","¼ cup granola","1 banana","Honey"],st:["Scoop yogurt. Top granola + banana. Drizzle honey."],tip:"Fastest real breakfast. 18g protein.",pl:"Add egg for 24g."},G2:{n:"PB Toast + Eggs + Fruit",i:"🍞",t:"Grab & Go",q:"Toast + PB, grab 2 eggs from fridge + apple.",pr:"22g",c:"$0.65",tm:"2 min",ing:["2 slices whole wheat","2 tbsp PB","2 hard-boiled eggs","Apple"],st:["Toast bread. Spread PB.","Grab eggs from fridge + fruit. Go."],tip:"Hard-boiled eggs last 5 days!",pl:"22g protein. Full 4–5 hours."},G3: function getSched(d,bf,din){const day=DAYS[d];if(day==='Sun')return[{t:'7:00',e:'Wake up',d:'Rest day.'},{t:'7:30',e:bf.n,d:bf.q},{t:'9:00',e:'🥗 Meal Prep Block 1',d:'Oats, smoothie bags, muffins, rice.',h:1},{t:'11:00',e:'Get ready for church',d:''},...(din.sc?[{t:'11:00',e:'⚠️ Slow Cooker',d:din.n,a:1}]:[]),{t:'12:00',e:'⛪ Church',d:'2 hours.'},{t:'2:30',e:'🥗 Meal Prep Block 2',d:'Pack lunches, chop veggies.',h:1},{t:'6:00',e:'🍽️ '+din.n,d:''},{t:'9:00',e:'Bedtime',d:''}];if(day==='Fri')return[{t:'4:00',e:'Wake up',d:''},{t:'4:15',e:bf.n,d:bf.q},...(din.sc?[{t:'4:30',e:'⚠️ Slow Cooker',d:din.n,a:1}]:[]),{t:'5:00',e:'Work',d:''},{t:'2:00',e:'Home — family time!',d:'Everyone together.',h:1},{t:'6:00',e:'🍽️ '+din.n,d:''},{t:'7:30',e:'Movie / game night',d:''},{t:'9:00',e:'Bedtime',d:''}];if(day==='Sat')return[{t:'7:00',e:'Wake up',d:''},{t:'7:30',e:bf.n,d:bf.q},{t:'8:30',e:'🏃 Family Activity',d:'Walk, hike, play.',h:1},{t:'10:30',e:'🛒 Walmart',d:'Bring the list!',a:1},{t:'6:00',e:'🍽️ '+din.n,d:''},{t:'9:30',e:'Bedtime',d:''}];const wo=['','Upper Body','Cardio+Core','Lower Body','Full Body'][DAYS.indexOf(day)];return[{t:'4:00',e:'Wake up',d:''},{t:'4:15',e:bf.n,d:bf.q},...(din.sc?[{t:'4:30',e:'⚠️ Slow Cooker',d:din.n,a:1}]:[]),{t:'5:00',e:'Work',d:''},{t:'7:00',e:'Dad + kids up',d:'Breakfast, lunches.'},{t:'3:00',e:'School pickup',d:''},{t:'4:00',e:'🏋️ '+wo,d:'30–40 min.',h:1},{t:'6:00',e:'🍽️ '+din.n,d:''},{t:'8:00',e:'Kids to bed',d:''},{t:'9:00',e:'Bedtime',d:''}]}
function rWeek(){let h=`<div class="sec">${WT[W-1]}</div><div class="ov-grid">`;DAYS.forEach((d,i)=>{const bf=BF[BA[W][d]],din=DIN[W][i],cls=d==='Sun'?'sun':d==='Fri'?'fri':d==='Sat'?'sat':'';h+=`<div class="ov-card ${cls}" onclick="D=${i};setTab('today')"><div class="ov-day">${DN[i]}</div><div class="ov-din">${din.n}${din.sc?' ⏰':''}</div><div class="ov-bf">${bf.i} ${bf.n}</div><div class="ov-cost">$${din.co.toFixed(2)}</div></div>`});h+='</div><div class="cd"><h3>Weekly Dinner Summary</h3>';let wt=0;DIN[W].forEach((d,i)=>{wt+=d.co*5;h+=`<div class="brow"><span class="bl"><strong>${DN[i].slice(0,3)}</strong> ${d.n}</span><span class="br" style="color:${d.co<=3?'var(--green)':d.co<=4?'var(--brown2)':'var(--coral)'}">$${d.co.toFixed(2)}</span></div>`});h+=`<div class="brow tot"><span class="bl">Week Total (family of 5)</span><span class="br">$${wt.toFixed(2)}</span></div></div>`;document.getElementById('p-week').innerHTML=h}
function rShop(){const k='shop'+W,ch=LS(k);const items=[];const seen=new Set();DIN[W].forEach(d=>d.ing.forEach(x=>{const key=x.toLowerCase().replace(/[0-9½¼¾]/g,'').trim();if(!seen.has(key)){seen.add(key);items.push(x)}}));['Eggs (2 dozen)','Greek yogurt (32 oz)','Milk (1 gal)','Butter (1 lb)','Bananas','Apples','Whole wheat bread','Cereal','Frozen waffles','Cottage cheese','Mixed berries frozen','Spinach','Cream cheese'].forEach(x=>{if(!seen.has(x.toLowerCase())){seen.add(x.toLowerCase());items.push(x)}});const done=Object.values(ch).filter(Boolean).length;let h=`<div class="sec">🛒 Week ${W} Shopping</div><div class="shop-count">${done} of ${items.length} items</div><div class="shop-prog"><div class="shop-fill" style="width:${items.length?done/items.length*100:0}%"></div></div><div class="cd">`;items.forEach((item,idx)=>{h+=`<div class="si${ch[idx]?' done':''}" id="si${idx}"><input type="checkbox" ${ch[idx]?'checked':''} onchange="togShop(${idx},this)"><span class="sn">${item}</span></div>`});h+=`<div style="padding:12px 0;text-align:center"><button onclick="LS('shop'+W,{});rShop()" style="background:none;border:1px solid var(--border);border-radius:20px;padding:8px 20px;font-size:.8em;color:var(--text3);cursor:pointer;font-family:inherit">Clear All</button></div></div>`;document.getElementById('p-shop').innerHTML=h}
function togShop(i,el){const k='shop'+W,d=LS(k);d[i]=el.checked;LS(k,d);document.getElementById('si'+i).classList.toggle('done',el.checked);const all=document.querySelectorAll('.si').length,dn=document.querySelectorAll('.si.done').length;document.querySelector('.shop-fill').style.width=(dn/all*100)+'%';document.querySelector('.shop-count').textContent=dn+' of '+all+' items'}
function rPrep(){const pk='prep'+W,pc=LS(pk);const b1=["Cook big batch of rice","Hard boil 10 eggs","Make smoothie freezer bags","Bake egg muffins (24!)","Prep overnight oats jars"],b2=["Chop snack veggies","Pack Monday lunches","Lay out workout clothes","Check slow cooker supplies","Thaw Mon/Tue proteins"];const all=[...b1,...b2],done=all.filter((_,i)=>pc[i]).length;let h=`<div class="sec">✅ Week ${W} Prep</div><div class="cd"><h3>🥗 Sunday Meal Prep</h3><div class="prep-prog"><span>${done}/${all.length}</span><div class="pp-bar"><div class="pp-fill" id="prepFill" style="width:${all.length?done/all.length*100:0}%"></div></div></div><div class="shop-cat">🌅 Before Church (9–11am)</div>`;b1.forEach((t,i)=>{h+=`<div class="prep-i${pc[i]?' done':''}" id="pi${i}"><input type="checkbox" ${pc[i]?'checked':''} onchange="togPrep(${i},this)"><label>${t}</label></div>`});h+=`<div class="shop-cat">🌆 After Church (2:30pm+)</div>`;b2.forEach((t,j)=>{const i=j+b1.length;h+=`<div class="prep-i${pc[i]?' done':''}" id="pi${i}"><input type="checkbox" ${pc[i]?'checked':''} onchange="togPrep(${i},this)"><label>${t}</label></div>`});h+='</div><div class="cd"><h3>📝 Daily Reminders</h3>';DAYS.forEach((d,di)=>{const bf=BF[BA[W][d]],din=DIN[W][di],tasks=[];if(din.sc&&d!=='Sun')tasks.push(`⚠️ Slow cooker: ${din.n}`);tasks.push(`Breakfast: ${bf.n}`);tasks.push(`Dinner: ${din.n}`);if(d==='Sat')tasks.push('🛒 Walmart run!');h+=`<div class="shop-cat">${DN[di]}</div>`;tasks.forEach(t=>h+=`<div style="padding:6px 0;font-size:.82em;color:var(--text2);border-bottom:1px solid var(--border)">• ${t}</div>`)});h+='</div>';document.getElementById('p-prep').innerHTML=h}
function togPrep(i,el){const k='prep'+W,d=LS(k);d[i]=el.checked;LS(k,d);document.getElementById('pi'+i).classList.toggle('done',el.checked);const tot=document.querySelectorAll('.prep-i').length,dn=document.querySelectorAll('.prep-i.done').length;document.getElementById('prepFill').style.width=(dn/tot*100)+'%';document.querySelector('.prep-prog span').textContent=dn+'/'+tot}
function rRecipes(){let h=`<div class="sec">📖 Week ${W} Recipes</div><div class="cd"><h3>🌅 Breakfasts</h3>`;DAYS.forEach((d,i)=>{const bf=BF[BA[W][d]];h+=`<div class="acc" onclick="tog(this)"><span>${bf.i} <strong>${DN[i].slice(0,3)}</strong> ${bf.n} <span class="pill pill-protein" style="font-size:.55em;vertical-align:middle">💪${bf.pr}</span></span></div><div class="acc-body"><div class="r-quick">${bf.q}</div><ul class="ing">${bf.ing.map(x=>'<li>'+x+'</li>').join('')}</ul><ol class="stp">${bf.st.map(x=>'<li>'+x+'</li>').join('')}</ol><div class="tip">💡 ${bf.tip}</div><div class="plate">⚖️ ${bf.pl}</div></div>`});h+='</div><div class="cd"><h3>🍽️ Dinners</h3>';DIN[W].forEach((din,i)=>{h+=`<div class="acc" onclick="tog(this)"><span><strong>${DN[i].slice(0,3)}</strong> ${din.n} <span class="pill" style="font-size:.55em;vertical-align:middle">$${din.co.toFixed(2)}</span>${din.sc?'<span class="badge badge-sc" style="font-size:.45em;vertical-align:middle;margin-left:4px">⏰SC</span>':''}</span></div><div class="acc-body"><div class="meta"><span class="pill">${din.cu}</span><span class="pill">${din.m}</span></div><ul class="ing">${din.ing.map(x=>'<li>'+x+'</li>').join('')}</ul><ol class="stp">${din.st.map(x=>'<li>'+x+'</li>').join('')}</ol><div class="tip">💡 ${din.tp}</div><div class="plate">⚖️ ${din.pl}</div><button class="cook-btn" onclick="openCook(${W},${i})" style="margin:10px 0">🍳 Cook This</button></div>`});h+='</div>';document.getElementById('p-recipes').innerHTML=h}
function openCook(w,di){const din=DIN[w][di];document.getElementById('cookTitle').textContent=din.n;let h=`<div class="cd"><h3>Ingredients</h3><ul class="ing" style="columns:1">${din.ing.map(x=>'<li>'+x+'</li>').join('')}</ul></div>`;din.st.forEach((s,si)=>h+=`<div class="cook-step"><div class="cs-num">${si+1}</div><p>${s}</p></div>`);h+=`<div class="tip">💡 ${din.tp}</div><div class="plate">⚖️ ${din.pl}</div><div class="cook-step"><div class="cs-num">⏱</div><p style="font-weight:700">Kitchen Timer</p><div class="cook-timer"><span class="ct-display" id="tDisp">00:00</span><button class="ct-start" id="tBtn" onclick="togTimer()">Start</button><input type="number" id="tMin" value="15" min="1" max="120" style="width:50px;padding:6px;border-radius:8px;border:1px solid var(--border);font-size:.9em;text-align:center"><span style="font-size:.8em;color:var(--text3)">min</span></div></div>`;document.getElementById('cookBody').innerHTML=h;document.getElementById('cookMode').classList.add('on');document.body.style.overflow='hidden'}
function closeCook(){document.getElementById('cookMode').classList.remove('on');document.body.style.overflow='';clearInterval(window._ti)}
let _tr=false,_ts=0;function togTimer(){const b=document.getElementById('tBtn');if(!_tr){_ts=parseInt(document.getElementById('tMin').value)*60;_tr=true;b.textContent='Stop';b.style.background='var(--coral)';window._ti=setInterval(()=>{_ts--;if(_ts<=0){clearInterval(window._ti);_tr=false;b.textContent='Done!';b.style.background='var(--green)';try{navigator.vibrate?.([200,100,200])}catch(e){}}const m=Math.floor(_ts/60),s=_ts%60;document.getElementById('tDisp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')},1000)}else{clearInterval(window._ti);_tr=false;b.textContent='Start';b.style.background='var(--green)'}}
function tog(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}
init();
</script></body></html>
